<!DOCTYPE html>

<style>

</style>
<script type="importmap">
{ "imports": {

<body>
<div id="hud"></div>
<div id="crosshair">+</div>
<div id="title-overlay">
  <h1 class="big">GALAXY</h1>
  <p class="sub">A PROCEDURAL UNIVERSE</p>
</div>
<div id="click-to-start">► CLICK TO START</div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ===== HELPERS =====
const TAU = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const randRange = (r, a, b) => a + r() * (b - a);
const randPick = (r, arr) => arr[Math.floor(r() * arr.length)];
// GLSL-style smoothstep for JS — used to drive distance-based fades.
function smoothstep(edge0, edge1, x) {
  const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

function posNoise(x, y, z) {
  const s = Math.sin(x*12.9898 + y*78.233 + z*37.719) * 43758.5453;
  return s - Math.floor(s);
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Returns an orthonormal basis whose normal is a uniform random unit vector.
// u and v span the plane perpendicular to that normal. Used to give every
// orbital ring / asteroid belt / ring system a random tilt in 3D.
function makeRandomBasis(rng) {
  const cosT = rng() * 2 - 1;
  const sinT = Math.sqrt(1 - cosT * cosT);
  const phi = rng() * TAU;
  const n = new THREE.Vector3(sinT * Math.cos(phi), cosT, sinT * Math.sin(phi));
  const ref = Math.abs(n.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
  const u = new THREE.Vector3().crossVectors(n, ref).normalize();
  const v = new THREE.Vector3().crossVectors(n, u).normalize();
  return { u, v, n };
}

const _v1 = new THREE.Vector3();
const _v2 = new THREE.Vector3();
const _v3 = new THREE.Vector3();
const _q1 = new THREE.Quaternion();
const _m1 = new THREE.Matrix4();
const _c1 = new THREE.Color();
const _c2 = new THREE.Color();

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  logarithmicDepthBuffer: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.28;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = null;
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 400000);
scene.add(camera);
window.__cam = camera; window.__scene = scene;
// Test hooks — let the playwright harness trigger supernova / laser without
// needing pointer-lock or mouse events. Not used in normal play.
window.__test = {
  get home() { return home; },
  get stars() { return allActiveStars; },
  supernova: (point, R) => supernova(point, R),
  destroyStar: (s) => destroyStar(s),
  // Tests reposition the camera directly — disable the intro orbit so it
  // doesn't fight them frame-by-frame.
  stopIntro: () => { if (typeof introActive !== 'undefined') introActive = false; },
  fireLaserAt: (target) => {
    // target can be a star ({pos}) or a THREE.Object3D (uses .position).
    const tp = target.pos || target.position;
    camera.lookAt(tp);
    camQuat.copy(camera.quaternion);
    fireLaser();
  },
  fire: () => fireLaser()
};

// ===== LIGHTING =====
// Slightly warmer + brighter ambient so the dark side of planets isn't pitch
// black — simulates scattered light from background stars / Milky Way.
scene.add(new THREE.AmbientLight(0x141a2b, 0.10));
const starLight = new THREE.DirectionalLight(0xffffff, 3.5);
starLight.position.set(0, 0, 0);
scene.add(starLight);
scene.add(starLight.target);

// ===== STAR DATA — INFINITE CHUNK STREAMING =====
// Larger CHUNK_SIZE × smaller STARS_PER_CHUNK = lower spatial density (the
// universe FEELS bigger, the eye picks out individual stars). Larger CHUNK_RADIUS
// = stars stay visible as faint pixel points much further out (no pop-out).
const CHUNK_SIZE = 20000;
const CHUNK_RADIUS = 10;                    // (2*10+1)^3 = 9261 chunks loaded
const STARS_PER_CHUNK = 2;                  // upper bound (theme picks 0-2)
const MAX_ACTIVE_STARS = (CHUNK_RADIUS*2 + 1) ** 3 * STARS_PER_CHUNK;
// Star fade: stars stay visible as bright COLOURED pixel pinpricks across the
// whole loaded volume. Loaded volume radius = CHUNK_RADIUS * CHUNK_SIZE
// = 200 000 units; fade-far is set inside that so we never see a hard
// chunk-unload pop. A star you fly past stays glowing in its real colour
// for hundreds of thousands of units.
const STAR_VISIBLE_FAR  = 380000;
const STAR_VISIBLE_NEAR = 800;

const chunkCache = new Map();
const allActiveStars = [];
let currentChunkKey = null;

function chunkKey(cx, cy, cz) { return cx + ',' + cy + ',' + cz; }

function chunkHash(cx, cy, cz) {
  let h = (cx * 73856093) ^ (cy * 19349663) ^ (cz * 83492791);
  return mulberry32(h | 0);
}

// REGION THEMES — every 4x4x4 super-chunk picks a theme that biases the star
// distribution. Same coords always pick the same theme, so the universe is
// deterministic, but adjacent regions have visibly different character.
//   void:     1-2 lonely stars, sparse but huge
//   cluster:  6-8 stars packed tight (open cluster)
//   normal:   3-4 stars random spread (default)
//   giants:   2-3 huge bright A/F class stars
const REGION_SIZE = 4;
function regionTheme(cx, cy, cz) {
  const rx = Math.floor(cx / REGION_SIZE);
  const ry = Math.floor(cy / REGION_SIZE);
  const rz = Math.floor(cz / REGION_SIZE);
  // Stable hash, distinct from chunkHash so themes don't correlate to seeds.
  let h = (rx * 134775813) ^ (ry * 49979693) ^ (rz * 191) ^ 0xCAFEBABE;
  const t = mulberry32(h | 0)();
  if (t < 0.30)      return 'void';
  else if (t < 0.50) return 'cluster';
  else if (t < 0.80) return 'normal';
  else               return 'giants';
}

function getOrCreateChunk(cx, cy, cz) {
  const key = chunkKey(cx, cy, cz);
  let chunk = chunkCache.get(key);
  if (chunk) return chunk;
  chunk = [];
  const r = chunkHash(cx, cy, cz);
  const theme = regionTheme(cx, cy, cz);
  // Theme decides star count and size distribution. STARS_PER_CHUNK is the
  // upper bound (buffer size constraint); we read it and pick fewer.
  let count, sizeMin, sizeMax, biasGiants;
  switch (theme) {
    case 'void':    count = 0;                 sizeMin = 80;  sizeMax = 450; biasGiants = 0.0; break;
    case 'cluster': count = STARS_PER_CHUNK;   sizeMin = 30;  sizeMax = 200; biasGiants = 0.0; break;
    case 'giants':  count = 1;                 sizeMin = 200; sizeMax = 700; biasGiants = 1.0; break;
    default:        count = 1;                 sizeMin = 50;  sizeMax = 400; biasGiants = 0.0; break;
  }
  // Home chunk must always contain the home star, even if its theme is void.
  if (cx === 0 && cy === 0 && cz === 0) count = Math.max(count, 1);
  // Use a dummy block to allow the existing closing brace below.
  {
  }
  // Clusters: place stars near a single anchor inside the chunk for the tight
  // open-cluster look. Other themes scatter uniformly.
  const isCluster = theme === 'cluster';
  const anchorX = isCluster ? r() : 0;
  const anchorY = isCluster ? r() : 0;
  const anchorZ = isCluster ? r() : 0;
  for (let i = 0; i < count; i++) {
    let fx, fy, fz;
    if (isCluster) {
      fx = anchorX + (r()-0.5) * 0.25;
      fy = anchorY + (r()-0.5) * 0.25;
      fz = anchorZ + (r()-0.5) * 0.25;
    } else {
      fx = r(); fy = r(); fz = r();
    }
    const x = (cx + fx) * CHUNK_SIZE;
    const y = (cy + fy) * CHUNK_SIZE;
    const z = (cz + fz) * CHUNK_SIZE;
    const radius = randRange(r, sizeMin, sizeMax);
    let t = r();
    if (biasGiants > 0) t = t * (1 - biasGiants) + 0.95 * biasGiants;
    let baseCol, klass;
    if (cx === 0 && cy === 0 && cz === 0 && i === 0) {
      baseCol = new THREE.Color(0xfff2c0); klass = 'G';   // home is always G
    } else if (t < 0.55) { baseCol = new THREE.Color(0xff9966); klass = 'M'; }
    else if (t < 0.78) { baseCol = new THREE.Color(0xffcc66); klass = 'K'; }
    else if (t < 0.90) { baseCol = new THREE.Color(0xfff2c0); klass = 'G'; }
    else if (t < 0.97) { baseCol = new THREE.Color(0xffffff); klass = 'F'; }
    else { baseCol = new THREE.Color(0xaaccff); klass = 'A'; }
    baseCol.multiplyScalar(0.6 + r() * 0.6);
    chunk.push({
      pos: new THREE.Vector3(x, y, z),
      color: baseCol,
      radius, klass,
      key: key + ':' + i,
      system: null
    });
  }
  chunkCache.set(key, chunk);
  return chunk;
}

// Home star (always present, deterministic).
const homeChunk = getOrCreateChunk(0, 0, 0);
const home = homeChunk[0];

// Camera initial pose — pulled back and offset so the player sees the home
// star plus the nearby showcase planet (rings + moons) on first frame.
camera.position.set(home.pos.x + home.radius + 1400, home.pos.y + 250, home.pos.z + 900);
// Look at a point between the home star and the showcase planet's expected
// orbital location so both fit in the frame.
camera.lookAt(home.pos.x - 100, home.pos.y + 100, home.pos.z - 300);

// Quaternion-based view: avoids gimbal lock / Euler discontinuities.
const camQuat = new THREE.Quaternion().copy(camera.quaternion); window.__camQuat = camQuat;
let yawDelta = 0, pitchDelta = 0;       // mouse-driven, accumulated per frame
const _qTmp = new THREE.Quaternion();
const AXIS_X = new THREE.Vector3(1, 0, 0);
const AXIS_Y = new THREE.Vector3(0, 1, 0);
const AXIS_Z = new THREE.Vector3(0, 0, 1);

// ===== FAR STAR POINTS =====
const starGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(MAX_ACTIVE_STARS * 3);
const starColors    = new Float32Array(MAX_ACTIVE_STARS * 3);
const starSizes     = new Float32Array(MAX_ACTIVE_STARS);
starGeometry.setAttribute('position',  new THREE.BufferAttribute(starPositions, 3));
starGeometry.setAttribute('color',     new THREE.BufferAttribute(starColors, 3));
starGeometry.setAttribute('starSize',  new THREE.BufferAttribute(starSizes, 1));
starGeometry.setDrawRange(0, 0);

const starMat = new THREE.ShaderMaterial({
  uniforms: {
    uFadeFar:  { value: STAR_VISIBLE_FAR },
    uFadeNear: { value: STAR_VISIBLE_NEAR },
    uTime:     { value: 0 }
  },
  vertexShader: `
    uniform float uFadeFar;
    uniform float uFadeNear;
    uniform float uTime;
    attribute float starSize;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vFade;
    varying float vSize;        // actual rendered pixel size — drives the halo
    varying float vTwinkle;     // 0..1 brightness modulation per-star
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mv;
      float dist = length(mv.xyz);
      // Pixel size matches what a real sphere of this radius would project to.
      float projPx = starSize * 770.0 / max(1.0, dist);
      // Min 1.4 px — a distant star shows as a clearly visible bright dot
      // but tight enough to read as a pinprick, not a marshmallow.
      float ps = clamp(projPx, 1.4, 160.0);
      gl_PointSize = ps;
      vSize = ps;
      vFade = smoothstep(uFadeFar, uFadeNear, dist);
      // Per-star phase from position — deterministic, fast, no texture lookup.
      float seed = fract(sin(dot(position.xyz, vec3(12.9898, 78.233, 37.719))) * 43758.5453);
      // Two-frequency twinkle (rapid + slow) for organic feel.
      float fast = sin(uTime * 2.7 + seed * 6.2831) * 0.5 + 0.5;
      float slow = sin(uTime * 0.6 + seed * 12.566) * 0.5 + 0.5;
      vTwinkle = 0.78 + 0.22 * mix(fast, slow, 0.4);
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vFade;
    varying float vSize;
    varying float vTwinkle;
    void main() {
      vec2 uv = (gl_PointCoord - 0.5) * 2.0;
      float d = length(uv);
      if (d > 1.0) discard;
      // Tighter pinprick — much sharper falloff so it reads as a point, not a disc.
      // Halo only ramps up for stars big enough to need one.
      float haloAmt = smoothstep(3.0, 9.0, vSize);
      float core = exp(-d * d * 32.0);            // very tight central hot dot
      float midGlow = exp(-d * d * 6.0) * 0.35;   // soft inner glow for medium pixels
      float halo = exp(-d * d * 1.2) * 0.18 * haloAmt;
      // Diffraction spikes — only on the brightest stars (vSize > 5px).
      float spikeAmt = smoothstep(5.0, 14.0, vSize);
      float sx = exp(-uv.x*uv.x * 220.0) * exp(-uv.y*uv.y * 1.8);
      float sy = exp(-uv.y*uv.y * 220.0) * exp(-uv.x*uv.x * 1.8);
      float spikes = (sx + sy) * spikeAmt * 0.55;
      // Pinprick brightness boost — small distant stars must read clearly.
      float smallBoost = (1.0 - haloAmt) * 0.9;
      float bodyI = core * (1.7 + smallBoost) + midGlow * (0.7 + smallBoost * 0.4)
                  + halo * 0.55 + spikes * 1.3;
      float alphaI = core + midGlow * 0.4 + halo + spikes;
      gl_FragColor = vec4(vColor * bodyI * vTwinkle, alphaI * vFade * vTwinkle);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const starPoints = new THREE.Points(starGeometry, starMat);
starPoints.frustumCulled = false;
scene.add(starPoints);

// ===== INSTANCED STAR SPHERES + CORONAS =====
// Every active star also renders as a real 3D sphere via InstancedMesh.
// No K-boundary, no swap: the sphere is always there, it just projects to
// sub-pixel size when the star is very far away. As the camera approaches,
// the sphere naturally grows in screen size via perspective, smoothly
// replacing the underlying point dot.
const STAR_INST_GEOM   = new THREE.SphereGeometry(1, 16, 12);
const CORONA_INST_GEOM = new THREE.SphereGeometry(1, 16, 12);

const starInstColors   = new Float32Array(MAX_ACTIVE_STARS * 3);
const coronaInstColors = new Float32Array(MAX_ACTIVE_STARS * 3);
STAR_INST_GEOM.setAttribute('instColor',   new THREE.InstancedBufferAttribute(starInstColors, 3));
CORONA_INST_GEOM.setAttribute('instColor', new THREE.InstancedBufferAttribute(coronaInstColors, 3));

// Projected-size based fade: the 3D mesh is only present when its on-screen
// diameter is bigger than the pixel-star (~3px). Below ~3px the mesh fades
// out and the constant-size pixel takes over. This naturally adapts per
// instance — huge stars stay as meshes from much farther away than small ones.
const starInstMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute vec3 instColor;
    varying vec3 vColor;
    varying vec3 vNormalE;
    varying vec3 vViewE;
    varying vec3 vLocal;
    varying float vFade;
    varying float vSeed;
    void main() {
      vColor = instColor;
      vLocal = position;
      mat4 mvi = modelViewMatrix * instanceMatrix;
      vec4 mv = mvi * vec4(position, 1.0);
      vNormalE = normalize(mat3(mvi) * normal);
      vViewE = normalize(-mv.xyz);
      float radius = length(vec3(instanceMatrix[0]));
      vec4 centerMV = mvi * vec4(0.0, 0.0, 0.0, 1.0);
      float distC = length(centerMV.xyz);
      float projPx = radius * 770.0 / max(1.0, distC);
      // 3D sphere stays present long after the body has shrunk to a small
      // disc on screen — the player should feel stars are massive objects,
      // not little pixel dots. The transition to a point only happens for
      // very, very distant stars (sub-2px projected).
      vFade = smoothstep(1.6, 4.0, projPx);
      vSeed = fract(sin(instanceMatrix[3].x * 0.0123 + instanceMatrix[3].z * 0.0456) * 43758.5453);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec3 vColor;
    varying vec3 vNormalE;
    varying vec3 vViewE;
    varying vec3 vLocal;
    varying float vFade;
    varying float vSeed;
    float hash(vec3 p) {
      return fract(sin(dot(p, vec3(12.9898,78.233,37.719))) * 43758.5453);
    }
    float noise(vec3 p) {
      vec3 i = floor(p);
      vec3 f = fract(p);
      f = f*f*(3.0-2.0*f);
      float n000 = hash(i + vec3(0,0,0));
      float n100 = hash(i + vec3(1,0,0));
      float n010 = hash(i + vec3(0,1,0));
      float n110 = hash(i + vec3(1,1,0));
      float n001 = hash(i + vec3(0,0,1));
      float n101 = hash(i + vec3(1,0,1));
      float n011 = hash(i + vec3(0,1,1));
      float n111 = hash(i + vec3(1,1,1));
      return mix(
        mix(mix(n000,n100,f.x), mix(n010,n110,f.x), f.y),
        mix(mix(n001,n101,f.x), mix(n011,n111,f.x), f.y),
        f.z);
    }
    void main() {
      // Hard cutoff — stars are massive solid bodies, no fade-shimmer.
      if (vFade < 0.5) discard;
      float dotNV = abs(dot(vNormalE, vViewE));
      vec3 n = normalize(vLocal);
      float t = uTime * 0.05 + vSeed * 30.0;
      float gran = noise(n * 8.0 + vec3(t, 0.0, 0.0)) * 0.55
                 + noise(n * 22.0 + vec3(0.0, t * 1.7, 0.0)) * 0.35
                 + noise(n * 60.0) * 0.20;
      gran = clamp(gran, 0.0, 1.0);
      float limb = pow(dotNV, 0.55);
      float bright = mix(0.55, 1.0, limb) * (0.78 + gran * 0.42);
      float hot = smoothstep(0.65, 0.95, gran) * limb * 0.65;
      vec3 surf = vColor * bright + vColor * hot;
      surf = surf / (1.0 + max(max(surf.r, surf.g), surf.b) * 0.35);
      // Fully opaque — the body has substance, not a ghostly halo.
      gl_FragColor = vec4(surf, 1.0);
    }
  `,
  transparent: false,
  depthWrite: true,
  side: THREE.FrontSide,
  blending: THREE.NormalBlending
});
const starInstMesh = new THREE.InstancedMesh(STAR_INST_GEOM, starInstMat, MAX_ACTIVE_STARS);
starInstMesh.frustumCulled = false;
starInstMesh.count = 0;
starInstMesh.userData.kind = 'star';
scene.add(starInstMesh);

const coronaInstMat = new THREE.ShaderMaterial({
  vertexShader: `
    attribute vec3 instColor;
    varying vec3 vNormalW;
    varying vec3 vViewW;
    varying vec3 vColor;
    varying float vFade;
    void main() {
      vColor = instColor;
      mat4 mvi = modelViewMatrix * instanceMatrix;
      vec4 mv = mvi * vec4(position, 1.0);
      vNormalW = normalize(mat3(mvi) * normal);
      vViewW = normalize(-mv.xyz);
      // Corona radius is 2x the star radius; halve it back to drive the fade
      // off the inner sphere's projected size, so corona and inner appear and
      // disappear together.
      float innerRadius = length(vec3(instanceMatrix[0])) * 0.5;
      vec4 centerMV = mvi * vec4(0.0, 0.0, 0.0, 1.0);
      float distC = length(centerMV.xyz);
      float projPx = innerRadius * 770.0 / max(1.0, distC);
      vFade = smoothstep(1.0, 3.5, projPx);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vNormalW;
    varying vec3 vViewW;
    varying vec3 vColor;
    varying float vFade;
    void main() {
      // Soft outward halo — peak at silhouette but with gentle falloff.
      // Multiplier kept low so we don't get the donut-ring look.
      float f = 1.0 - abs(dot(vNormalW, vViewW));
      f = pow(f, 2.5);
      gl_FragColor = vec4(vColor * 1.3, f * vFade * 0.35);
    }
  `,
  transparent: true, depthWrite: false,
  side: THREE.BackSide, blending: THREE.AdditiveBlending
});
const coronaInstMesh = new THREE.InstancedMesh(CORONA_INST_GEOM, coronaInstMat, MAX_ACTIVE_STARS);
coronaInstMesh.frustumCulled = false;
coronaInstMesh.count = 0;
coronaInstMesh.visible = false; // halo disabled — stars are bare 3D spheres

function rebuildStarPoints() {
  let n = 0;
  for (const s of allActiveStars) {
    if (s.dead) continue;
    starPositions[n*3]   = s.pos.x;
    starPositions[n*3+1] = s.pos.y;
    starPositions[n*3+2] = s.pos.z;
    starColors[n*3]   = s.color.r;
    starColors[n*3+1] = s.color.g;

      _v2.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize(),
      Math.random() * TAU
    );
    // Wider size variety — some big "named" asteroids you can fly past.
    const sizeRoll = Math.random();
    let s;
    if (sizeRoll < 0.7)      s = 0.3 + Math.random() * 2.0;
    else if (sizeRoll < 0.95) s = 2.0 + Math.random() * 4.0;
    else                     s = 5.0 + Math.random() * 9.0;
    _v3.set(s, s, s);
    _m1.compose(_v1, _q1, _v3);
    inst.setMatrixAt(i, _m1);
  }
  inst.instanceMatrix.needsUpdate = true;
  inst.frustumCulled = false;
  return inst;
}

// Ring-system debris — instanced asteroid mesh that fills a planet's ring with
// real 3D rock chunks you can fly past. The mesh lives inside a group that
// inherits the ring's orientation, so when the group spins on its local Z it's
// orbiting around the ring normal (i.e. the planet's axis).
// Global registry of ring-asteroid materials whose per-instance spin needs
// uTime updates each frame.
const ringSpinMaterials = [];

// Build a material that rotates every instance around its own centre using
// per-instance axis+speed baked into a vertex attribute. Done via
// onBeforeCompile so we still get the standard PBR lighting pipeline.
function makeSpinningRockMaterial(baseMat) {
  const mat = baseMat.clone();
  const uTime = { value: 0 };
  mat.userData.uTime = uTime;
  mat.onBeforeCompile = (shader) => {
    shader.uniforms.uTime = uTime;
    shader.vertexShader = `
      attribute vec4 aSpinAxis;
      uniform float uTime;
      mat3 _axisAngleM(vec3 a, float ang) {
        float c = cos(ang), s = sin(ang), ic = 1.0 - c;
        return mat3(
          c + a.x*a.x*ic,        a.y*a.x*ic + a.z*s,    a.z*a.x*ic - a.y*s,
          a.x*a.y*ic - a.z*s,    c + a.y*a.y*ic,        a.z*a.y*ic + a.x*s,
          a.x*a.z*ic + a.y*s,    a.y*a.z*ic - a.x*s,    c + a.z*a.z*ic
        );
      }
    ` + shader.vertexShader
      .replace(
        '#include <beginnormal_vertex>',
        `
        mat3 _spinM = _axisAngleM(aSpinAxis.xyz, uTime * aSpinAxis.w);
        vec3 objectNormal = _spinM * vec3( normal );
        #ifdef USE_TANGENT
          vec3 objectTangent = _spinM * vec3( tangent.xyz );
        #endif
        `
      )
      .replace(
        '#include <begin_vertex>',
        `vec3 transformed = _spinM * vec3( position );`
      );
  };
  ringSpinMaterials.push(mat);
  return mat;
}

function makeRingAsteroidsGroup(planet) {
  if (!planet.rings || planet.ringInner == null) return null;
  const group = new THREE.Group();
  group.rotation.copy(planet.rings.rotation);

  const seed = (Math.floor(planet.orbit * 137) ^ Math.floor(planet.radius * 7919) ^ 0xC0FFEE) | 0;
  const r = mulberry32(seed);

  const innerR = planet.ringInner;
  const outerR = planet.ringOuter;
  const ringWidth = outerR - innerR;
  // Even denser dust field — tiny pebbles, lots of them.
  const count = Math.floor(9000 + r() * 6000 + ringWidth * 10);
  // Clone the source geometry so we can attach per-instance attributes
  // without polluting the shared asteroid geometry pool.
  const baseGeom = asteroidGeoms[Math.floor(r() * asteroidGeoms.length)];
  const geom = baseGeom.clone();
  const mat = makeSpinningRockMaterial(beltMaterials[Math.floor(r() * 3)]);
  const inst = new THREE.InstancedMesh(geom, mat, count);
  inst.frustumCulled = false;

  const thickness = ringWidth * 0.022;
  // Per-instance spin: unit axis + signed angular speed.
  const spinData = new Float32Array(count * 4);

  for (let i = 0; i < count; i++) {
    let t = r();
    t = 0.5 + (t - 0.5) * (0.9 + 0.2 * Math.sin(t * 12.0));
    t = clamp(t, 0.0, 1.0);
    const rad = innerR + t * ringWidth;
    const a = r() * TAU;
    const offN = (r() - 0.5) * thickness;
    const px = Math.cos(a) * rad;
    const py = Math.sin(a) * rad;
    const pz = offN;
    // Much smaller: most are tiny dust grains barely visible individually,
    // but the dense field reads as a real ring texture from any distance.
    const sizeRoll = r();
    let s;
    if (sizeRoll < 0.82)      s = 0.04 + r() * 0.18;     // dust motes
    else if (sizeRoll < 0.98) s = 0.22 + r() * 0.55;     // small pebbles
    else                      s = 0.80 + r() * 1.40;     // rare chunk
    const q = new THREE.Quaternion().setFromAxisAngle(
      _v2.set(r()-0.5, r()-0.5, r()-0.5).normalize(),
      r() * TAU
    );
    _v1.set(px, py, pz);
    _v3.set(s, s, s);
    _m1.compose(_v1, q, _v3);
    inst.setMatrixAt(i, _m1);
    // Per-instance spin axis (random unit vector) + small angular speed.
    let ax = r()-0.5, ay = r()-0.5, az = r()-0.5;
    const len = Math.hypot(ax, ay, az) || 1;
    spinData[i*4]   = ax / len;
    spinData[i*4+1] = ay / len;
    spinData[i*4+2] = az / len;
    // Subtle speed: -0.5..+0.5 rad/sec, with a slight bias toward slower
    // rotations so the field looks more "tumbling rocks" than "spinning tops".
    spinData[i*4+3] = (r() - 0.5) * 1.0 * (0.4 + r() * 0.6);
  }
  inst.instanceMatrix.needsUpdate = true;
  geom.setAttribute('aSpinAxis', new THREE.InstancedBufferAttribute(spinData, 4));

  group.add(inst);
  group.userData.spinMesh = inst;
  group.userData.angularSpeed = (0.012 + r() * 0.020) * (r() < 0.5 ? 1 : -1);
  return group;
}

// ===== PLANETS =====
// Pool of ring textures — varied banding patterns, generated once and reused
// across planets. Per-planet variation comes from tint + scale + opacity.
const ringTextureCache = [];
function makeRingTexture(seed) {
  const r = mulberry32(seed);
  const W = 1024, H = 8;  // long 1D-style texture; height is just for mipmapping
  const cnv = document.createElement('canvas');
  cnv.width = W; cnv.height = H;
  const ctx = cnv.getContext('2d');
  // Clear transparent.
  ctx.clearRect(0, 0, W, H);
  // Underlying density profile — bright middle, falls off at edges, with
  // a few dark "Cassini-style" gaps.
  const gapCount = 3 + Math.floor(r() * 4);
  const gaps = [];
  for (let i = 0; i < gapCount; i++) {
    gaps.push({ center: 0.20 + r() * 0.70, width: 0.005 + r() * 0.025 });
  }
  // High-frequency banding seeds.
  const bandFreqs = [
    { f: 70 + r() * 50, a: 0.30 + r() * 0.20, phase: r() * TAU },
    { f: 23 + r() * 12, a: 0.45 + r() * 0.20, phase: r() * TAU },
    { f: 7 + r() * 5,   a: 0.30 + r() * 0.20, phase: r() * TAU }
  ];
  const img = ctx.createImageData(W, H);
  const data = img.data;
  for (let x = 0; x < W; x++) {
    const t = x / W;              // 0 = inner edge, 1 = outer edge
    // Body envelope — soft inside, dense middle, fading outside.
    let density = smoothstep(0.0, 0.08, t) * (1.0 - smoothstep(0.85, 1.0, t));
    // Layered banding.
    let band = 0.7;
    for (const b of bandFreqs) {
      band += Math.sin(t * b.f + b.phase) * b.a * 0.5;
    }
    band = clamp(band, 0.0, 1.0);
    density *= band;
    // Punch gaps.
    for (const g of gaps) {
      const d = Math.abs(t - g.center) / g.width;
      density *= clamp(d * d, 0.0, 1.0);   // sharp gap
    }
    // Random small scintillation along radius — ice/dust particles.
    density *= 0.65 + 0.35 * posNoise(t * 47, seed * 0.31, 0.5);
    density = clamp(density, 0.0, 1.0);
    // Tint shifts slightly across the radius (warm inner -> cool outer).
    const warm = 1.0 - t;
    const rC = 0.85 + warm * 0.15;
    const gC = 0.78 + warm * 0.12;
    const bC = 0.72 + warm * 0.05;
    for (let y = 0; y < H; y++) {
      const idx = (y * W + x) * 4;
      data[idx]   = (rC * 255) | 0;
      data[idx+1] = (gC * 255) | 0;
      data[idx+2] = (bC * 255) | 0;
      data[idx+3] = (density * 255) | 0;
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}
for (let i = 0; i < 6; i++) ringTextureCache.push(makeRingTexture(2000 + i));

// Custom radial-UV ring geometry — so the ring texture's X axis maps to the
// radial direction (inner -> outer) regardless of segment count.
function makeRingGeometry(innerR, outerR, segs) {
  const geom = new THREE.RingGeometry(innerR, outerR, segs, 1);
  // Default UVs in three.js RingGeometry: clamped to (theta_seg, phi_seg).
  // We replace them with (radial_t, 0.5) so the long banded texture sweeps
  // out from inner to outer along the strip uniformly.
  const uv = geom.attributes.uv;
  const pos = geom.attributes.position;
  for (let i = 0; i < uv.count; i++) {
    const x = pos.getX(i), y = pos.getY(i);
    const r = Math.sqrt(x*x + y*y);
    const t = (r - innerR) / (outerR - innerR);
    uv.setXY(i, t, 0.5);
  }
  uv.needsUpdate = true;
  return geom;
}

// Procedural planet surface — gas-giant bands or rocky variation. Painted into
// vertex colors so we don't need a separate texture map per planet.
function paintPlanetSurface(geom, r, type) {
  const pos = geom.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  if (type === 'gas') {
    // Gas giant: latitudinal bands with turbulent edges + random palette.
    // Pick palettes that resemble real Jovian-system planets.
    const palettes = [
      { a: new THREE.Color(0xd6c6a3), b: new THREE.Color(0x8a6438), c: new THREE.Color(0xefdcb6) }, // Jupiter
      { a: new THREE.Color(0xe9c896), b: new THREE.Color(0xa6743a), c: new THREE.Color(0xf6e8c4) }, // Saturn
      { a: new THREE.Color(0xa6c2d8), b: new THREE.Color(0x4a6e92), c: new THREE.Color(0xd4e2ee) }, // Uranus-pale
      { a: new THREE.Color(0x3760a4), b: new THREE.Color(0x1b2a4e), c: new THREE.Color(0x6488c4) }, // Neptune
      { a: new THREE.Color(0xc05544), b: new THREE.Color(0x6b1f15), c: new THREE.Color(0xe28872) }, // hot Jupiter red
      { a: new THREE.Color(0xa46db3), b: new THREE.Color(0x3a1d4a), c: new THREE.Color(0xd0a3df) }, // exotic purple
    ];
    const palette = palettes[Math.floor(r() * palettes.length)];
    const baseA = palette.a, baseB = palette.b, baseC = palette.c;
    const bandCount = 8 + Math.floor(r() * 6);
    const phase = r() * TAU;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const R = Math.sqrt(x*x + y*y + z*z);
      const lat = y / R;                    // -1..1
      // Band signal: sharp cos^N pattern so the edges read as clearly defined bands.
      const turb = posNoise(x*0.08, y*0.08, z*0.08) * 0.22
                 + posNoise(x*0.35, y*0.35, z*0.35) * 0.08;
      const raw = Math.cos((lat + turb) * bandCount + phase);
      const sig = clamp(raw * 0.5 + 0.5, 0, 1);
      // Sharpen toward 0/1 so bands look distinct, not gradient.
      const sigSharp = sig * sig * (3 - 2 * sig);
      // Pick from three colour stops in rotation so we get more variety than a 2-tone gradient.
      let c;
      const tri = (lat * 0.5 + 0.5) * 3.0;
      const slice = Math.floor(tri);
      const local = tri - slice;
      const tA = (slice === 0) ? baseA : (slice === 1 ? baseB : baseC);
      const tB = (slice === 0) ? baseB : (slice === 1 ? baseC : baseA);
      c = _c1.copy(tA).lerp(tB, local);
      // Lerp toward the highlight colour where sigSharp is high.
      const highlight = _c2.copy(baseC).lerp(baseA, 0.4);
      c.lerp(highlight, sigSharp * 0.4);
      // Storms — small turbulent darker oval near equator.
      const storm = posNoise(x*0.40 + 1.7, y*0.40, z*0.40 + 3.3);
      if (Math.abs(lat) < 0.45 && storm > 0.75) {
        c.lerp(_c2.copy(baseB).multiplyScalar(0.6), (storm - 0.75) * 4);
      }
      const tint = clamp(0.72 + posNoise(x*0.55, y*0.55, z*0.55) * 0.5, 0.55, 1.40);
      c.multiplyScalar(tint);
      colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
    }
  } else if (type === 'ice') {
    // Pale icy world — blue-white with subtle frosty bands and polar haze.
    const baseA = new THREE.Color().setHSL(0.55 + r()*0.10, 0.25, 0.78);
    const baseB = new THREE.Color().setHSL(0.55 + r()*0.10, 0.32, 0.55);
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const R = Math.sqrt(x*x + y*y + z*z);
      const lat = Math.abs(y / R);
      const n = posNoise(x*0.18, y*0.18, z*0.18);
      const c = _c1.copy(baseB).lerp(baseA, lat * 0.8 + n * 0.25);
      colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
    }
  } else {
    // Rocky/terrestrial — continents + oceans + ice caps with vertex coloring.
    const oceanCol = new THREE.Color().setHSL(0.58 + r()*0.05, 0.55, 0.28);
    const landCol  = new THREE.Color().setHSL(0.08 + r()*0.18, 0.45, 0.38);
    const desertCol= new THREE.Color().setHSL(0.10 + r()*0.04, 0.30, 0.55);
    const iceCol   = new THREE.Color(0xeaf2ff);
    const hasOcean = r() < 0.7;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const R = Math.sqrt(x*x + y*y + z*z);
      const lat = Math.abs(y / R);
      const n1 = posNoise(x*0.12, y*0.12, z*0.12);
      const n2 = posNoise(x*0.55 + 7, y*0.55, z*0.55 + 3);
      const elev = n1 * 0.7 + n2 * 0.3;
      let c;
      if (hasOcean && elev < 0.45) {
        c = _c1.copy(oceanCol);
      } else {
        c = _c1.copy(landCol).lerp(desertCol, Math.max(0, n2 - 0.4));
      }
      // Polar ice cap.
      if (lat > 0.80 - n2*0.10) c.lerp(iceCol, smoothstep(0.78, 0.95, lat));
      colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
    }
  }
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
}

function makePlanet(r, starRadius, orbit) {
  // Pick a planet "type" so we get varied looks per system.
  const typeRoll = r();
  let type, radius;
  if (typeRoll < 0.42) {                  // rocky/terrestrial — smaller
    type = 'rocky'; radius = randRange(r, 10, 45);
  } else if (typeRoll < 0.78) {           // gas giant — big
    type = 'gas';   radius = randRange(r, 60, 160);
  } else {                                // ice world — medium
    type = 'ice';   radius = randRange(r, 25, 75);
  }
  const geom = new THREE.SphereGeometry(radius, 48, 48);
  paintPlanetSurface(geom, r, type);
  geom.computeBoundingSphere();
  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: type === 'gas' ? 0.85 : (type === 'ice' ? 0.55 : 0.95),
    metalness: 0.0,
    transparent: true, opacity: 1

  mesh.userData.kind = 'planet';

  const basis = makeRandomBasis(r);

    mesh, orbit, phase: r() * TAU,
    speed: 0.05 + r() * 0.1, radius, type,
    atmoBaseOpacity: 0.45,
    ringBaseOpacity: 0.85,
    orbitU: basis.u,
    orbitV: basis.v,
    orbitN: basis.n,
    moons: []

  const wantAtmo = (type === 'gas') || (type === 'rocky' && r() < 0.55) || (type === 'ice' && r() < 0.30);
  if (wantAtmo) {
    let atmoColor;
    if (type === 'gas')        atmoColor = new THREE.Color().setHSL(0.06 + r()*0.10, 0.65, 0.60);
    else if (type === 'ice')   atmoColor = new THREE.Color().setHSL(0.55, 0.55, 0.78);
    else                       atmoColor = new THREE.Color().setHSL(0.55 + r()*0.10, 0.55, 0.65);
    // Fresnel rim shader with sun-direction bias — rim brighter on the sun side.
    const atmoMat = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: atmoColor },
        uOpacity: { value: 1.0 },
        uPlanetCenterW: { value: new THREE.Vector3() },
        uSunDirW: { value: new THREE.Vector3(1, 0, 0) }
      },
      vertexShader: `
        varying vec3 vN;
        varying vec3 vV;
        varying vec3 vWorld;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorld = wp.xyz;
          vec4 mv = viewMatrix * wp;
          vN = normalize(normalMatrix * normal);
          vV = normalize(-mv.xyz);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uOpacity;
        uniform vec3 uPlanetCenterW;
        uniform vec3 uSunDirW;
        varying vec3 vN;
        varying vec3 vV;
        varying vec3 vWorld;
        void main() {
          float f = 1.0 - abs(dot(normalize(vN), normalize(vV)));
          // Strong outer rim with quick falloff inside the planet's silhouette.
          float rim = pow(f, 2.6);
          // Sun-side brightening: lookup how much this rim point faces the sun.
          vec3 surfaceDirW = normalize(vWorld - uPlanetCenterW);
          float sunFacing = clamp(dot(surfaceDirW, uSunDirW) * 0.5 + 0.5, 0.0, 1.0);
          // Mix: dark side has only ~25% atmosphere, sun side full.
          float side = mix(0.25, 1.0, smoothstep(0.30, 0.78, sunFacing));
          gl_FragColor = vec4(uColor * (0.7 + rim * 1.4) * side, rim * uOpacity * side);
        }
      `,
      transparent: true,
      depthWrite: false,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending
    });
    const atmo = new THREE.Mesh(new THREE.SphereGeometry(radius * 1.08, 32, 32), atmoMat);
    result.atmosphere = atmo;
  }

  // Cloud layer — translucent sphere just above gas-giant surface, with bands.
  if (type === 'gas' && r() < 0.7) {
    const cloudColor = new THREE.Color().setHSL(0.06 + r()*0.10, 0.18, 0.85);
    const cloudMat = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: cloudColor },
        uOpacity: { value: 1.0 },
        uTime: { value: 0 },
        uSeed: { value: r() }
      },
      vertexShader: `
        varying vec3 vLocal;
        varying vec3 vN;
        varying vec3 vV;
        void main() {
          vLocal = position;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vN = normalize(normalMatrix * normal);
          vV = normalize(-mv.xyz);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uOpacity;
        uniform float uTime;
        uniform float uSeed;
        varying vec3 vLocal;
        varying vec3 vN;
        varying vec3 vV;
        float hash(vec3 p) { return fract(sin(dot(p, vec3(12.9898,78.233,37.719))) * 43758.5453); }
        float noise(vec3 p) {
          vec3 i = floor(p);
          vec3 f = fract(p); f = f*f*(3.0-2.0*f);
          float n000 = hash(i + vec3(0,0,0));
          float n100 = hash(i + vec3(1,0,0));
          float n010 = hash(i + vec3(0,1,0));
          float n110 = hash(i + vec3(1,1,0));
          float n001 = hash(i + vec3(0,0,1));
          float n101 = hash(i + vec3(1,0,1));
          float n011 = hash(i + vec3(0,1,1));
          float n111 = hash(i + vec3(1,1,1));
          return mix(
            mix(mix(n000,n100,f.x), mix(n010,n110,f.x), f.y),
            mix(mix(n001,n101,f.x), mix(n011,n111,f.x), f.y),
            f.z);
        }
        void main() {
