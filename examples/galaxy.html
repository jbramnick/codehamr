function fireLaser() {
  camera.getWorldPosition(_v1);
  _v2.set(0, 0, -1).applyQuaternion(camera.quaternion);
  raycaster.set(_v1, _v2);
  // Combine planet destructibles with the star InstancedMesh — the star
  // mesh returns hits with instanceId, so we can identify which star was hit.
  const hits = raycaster.intersectObjects([starInstMesh, ...destructibles], false);
  let dist = 5000;
  if (hits.length > 0) {
    const hitPoint = hits[0].point;
    dist = hits[0].distance;
    const hit = hits[0].object;
    if (hit === starInstMesh) {
      const idx = hits[0].instanceId;
      const star = instanceIndexToStar[idx];
      if (star && !star.dead) {
        supernova(hitPoint, star.radius);
        destroyStar(star);
      }
    } else if (hit.userData && hit.userData.kind === 'star') {
      // Legacy path — shouldn't happen now but harmless.
      supernova(hitPoint, hit.userData.starRef.radius);
      destroyStar(hit.userData.starRef);
    } else {
      explode(hitPoint, hit);
      removeDestructible(hit);
    }
  }
  laser.position.set(0, -1.5, -dist * 0.5 - 2);
  laser.scale.set(1, 1, dist);
  laser.visible = true;
  laserGlow.position.set(0, -1.5, -3);
  laserGlow.scale.set(8, 8, 1);
  laserGlow.visible = true;
  laserTimer = 0.18;
  playLaserSound();
}

function updateLaser(dt) {
  if (laserTimer > 0) {
    laserTimer -= dt;
    const a = clamp(laserTimer / 0.18, 0, 1);
    laser.material.opacity = a * 0.95;
    laserGlow.material.opacity = a * 0.9;
    if (laserTimer <= 0) { laser.visible = false; laserGlow.visible = false; }
  }
}

// ===== EXPLOSIONS =====
const EXP_FLASH_MAX = 200;
const EXP_RING_MAX = 600;
const EXP_SPHERE_MAX = 500;
const explosions = [];
const MAX_EXPLOSIONS = 6;

// --- Part builders. Each writes ud.totalLife so updates can compute progress. ---
function addFlash(rec, point, maxSize, life, color) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(1, 16, 16),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 1,
      blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
  m.position.copy(point);
  m.userData = { type: 'flash', maxSize, lifetime: life, totalLife: life };
  scene.add(m); rec.parts.push(m);
}

function addRing(rec, point, maxSize, life, color) {
  const m = new THREE.Mesh(
    new THREE.RingGeometry(0.9, 1.0, 96),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 1, side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
  m.position.copy(point);
  m.lookAt(camera.position);
  m.userData = { type: 'ring', maxSize, lifetime: life, totalLife: life };
  scene.add(m); rec.parts.push(m);
}

function addSphere(rec, point, maxSize, life, color, peakOpacity) {
  // FrontSide so when the player ends up INSIDE the shock bubble, the rear
  // hemisphere isn't drawn (back-face culled) and the view doesn't white out.
  // From outside it still reads as a hollow glowing bubble.
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(1, 24, 24),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: peakOpacity, side: THREE.FrontSide,
      blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
  m.position.copy(point);
  m.userData = { type: 'sphere', maxSize, lifetime: life, totalLife: life, peakOpacity };
  scene.add(m); rec.parts.push(m);
}

function addBigFrag(rec, point, size, speed, life, emissiveColor) {
  const geom = asteroidGeoms[Math.floor(Math.random() * asteroidGeoms.length)];
  const mat = new THREE.MeshStandardMaterial({
    color: 0x553322,
    emissive: emissiveColor || 0xff5522,
    emissiveIntensity: 0.8,
    roughness: 0.9, flatShading: true,
    transparent: true, opacity: 1
  });
  const m = new THREE.Mesh(geom, mat);
  m.scale.set(size, size, size);
  m.position.copy(point);
  const dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
  m.userData = {
    type: 'bigFrag',
    vel: dir.multiplyScalar(speed),
    angVel: new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2),
    lifetime: life, totalLife: life
  };
  scene.add(m); rec.parts.push(m);
}

function addMedFrag(rec, point, size, speed, life) {
  const geom = asteroidGeoms[Math.floor(Math.random() * asteroidGeoms.length)];
  const mat = new THREE.MeshBasicMaterial({
    color: 0xffaa44, transparent: true, opacity: 1
  });
  const m = new THREE.Mesh(geom, mat);
  m.scale.set(size, size, size);
  m.position.copy(point);
  const dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
  m.userData = {
    type: 'medFrag',
    vel: dir.multiplyScalar(speed),
    angVel: new THREE.Vector3(Math.random()*4, Math.random()*4, Math.random()*4),
    lifetime: life, totalLife: life
  };
  scene.add(m); rec.parts.push(m);
}

function addSparks(rec, point, count, minSpeed, maxSpeed, life, color, size) {
  const sparkPos = new Float32Array(count * 3);
  const sparkVel = new Float32Array(count * 3);
  const numSpikes = 14 + Math.floor(Math.random() * 6);
  const spikes = [];
  for (let i = 0; i < numSpikes; i++) {
    spikes.push(new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize());
  }
  for (let i = 0; i < count; i++) {
    sparkPos[i*3]   = point.x;
    sparkPos[i*3+1] = point.y;
    sparkPos[i*3+2] = point.z;
    const sp = spikes[i % numSpikes];
    const speed = minSpeed + Math.random() * (maxSpeed - minSpeed);
    const jx = sp.x + (Math.random()-0.5) * 0.22;
    const jy = sp.y + (Math.random()-0.5) * 0.22;
    const jz = sp.z + (Math.random()-0.5) * 0.22;
    const inv = 1 / Math.hypot(jx, jy, jz);
    sparkVel[i*3]   = jx * inv * speed;
    sparkVel[i*3+1] = jy * inv * speed;
    sparkVel[i*3+2] = jz * inv * speed;
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
  const mat = new THREE.PointsMaterial({
    color, size: size || 3, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const m = new THREE.Points(geom, mat);
  m.userData = { type: 'sparks', velocities: sparkVel, lifetime: life, totalLife: life };
  scene.add(m); rec.parts.push(m);
}

// LineSegments-based radial rays — true streaks (head out, tail follows with delay).
function addRays(rec, point, rayCount, headSpeed, tailDelay, color, life) {
  const dirs = [];
  const positions = new Float32Array(rayCount * 6);
  for (let i = 0; i < rayCount; i++) {
    dirs.push(new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize());
    positions[i*6]   = point.x; positions[i*6+1] = point.y; positions[i*6+2] = point.z;
    positions[i*6+3] = point.x; positions[i*6+4] = point.y; positions[i*6+5] = point.z;
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.LineBasicMaterial({
    color, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const m = new THREE.LineSegments(geom, mat);
  m.userData = {
    type: 'rays',
    dirs, origin: point.clone(),
    headSpeed, tailDelay,
    lifetime: life, totalLife: life
  };
  scene.add(m); rec.parts.push(m);
}

function explode(point, targetObj) {
  if (explosions.length >= MAX_EXPLOSIONS) {
    cleanupExplosion(explosions.shift());
  }
  let baseR = 10;
  if (targetObj.geometry) {
    if (!targetObj.geometry.boundingSphere) targetObj.geometry.computeBoundingSphere();
    if (targetObj.geometry.boundingSphere) baseR = targetObj.geometry.boundingSphere.radius;
  }
  const R = clamp(baseR, 1, 100);
  const rec = { t: 0, duration: 8.0, point: point.clone(), radius: R, parts: [] };

  addFlash(rec, point, clamp(R * 3, 5, EXP_FLASH_MAX), 0.5, 0xfff2aa);
  addRing(rec, point, clamp(R * 12, 20, EXP_RING_MAX), 1.5, 0xffaa44);
  addSphere(rec, point, clamp(R * 9, 15, EXP_SPHERE_MAX), 1.2, 0x88bbff, 0.6);

  // Big fragments — half the size, ~3x the drift speed.
  const bigCount = 8 + Math.floor(Math.random() * 12);
  for (let i = 0; i < bigCount; i++) {
    addBigFrag(rec, point,
      R * (0.075 + Math.random() * 0.175),
      6 + Math.random() * 18,
      3.5 + Math.random() * 2.5,                  // shorter — debris fades in 4-6s
      0xff5522);
  }
  const medCount = 30 + Math.floor(Math.random() * 30);
  for (let i = 0; i < medCount; i++) {
    addMedFrag(rec, point,
      R * (0.04 + Math.random() * 0.1),
      8 + Math.random() * 20,
      2 + Math.random() * 2);
  }
  addSparks(rec, point, 600, 60, 180, 1.6, 0xffee88, 3);
  addRays(rec, point, 56, 320, 0.18, 0xffd07a, 1.6);

  explosions.push(rec);
  playExplosionSound();
}

// Star kill — multi-stage supernova:
//   1. White-hot screen-bright flash (~0.3s)
//   2. Warm secondary flash that lingers
//   3. Multi-layer expanding shock bubble (blue outer + warm inner)
//   4. Five chromatic rings expanding at different rates
//   5. Heavy debris cloud + sparks + radial light streaks
//   6. Slow violet remnant cloud that persists for ~12s after
function supernova(point, R) {
  if (explosions.length >= MAX_EXPLOSIONS) {
    cleanupExplosion(explosions.shift());
  }
  const rec = { t: 0, duration: 18.0, point: point.clone(), radius: R, parts: [] };

  // Initial glare — bright, very wide, longer fade for screen-bright impact.
  addFlash(rec, point, 6500, 0.35, 0xffffff);
  // Secondary warm flash hands off as the glare dies and lingers.
  addFlash(rec, point, 4200, 1.2,  0xffddaa);
  // Tertiary cool flash to add chromatic depth.
  addFlash(rec, point, 2800, 2.0,  0xaaddff);

  // Massive expanding shock bubble — slow, wuchtig, long-lived. Sized so the
  // shock doesn't dwarf typical viewing distances (player can still see the
  // edge of the bubble even from a few thousand units away).
  addSphere(rec, point, 9500, 6.5, 0xaaccff, 0.85);
  // Inner warmer bubble.
  addSphere(rec, point, 6500, 4.4, 0xffcc88, 0.75);
  // Innermost violent core, hands off fastest.
  addSphere(rec, point, 3800, 2.4, 0xfff2aa, 0.85);

  // Five chromatic rings expanding at different rates — the layered shock.
  addRing(rec, point, 11500, 7.0, 0xffeeaa);
  addRing(rec, point,  9200, 5.4, 0xff8855);
  addRing(rec, point,  7000, 4.0, 0x88ddff);
  addRing(rec, point,  5000, 2.8, 0xff55cc);
  addRing(rec, point, 13500, 8.5, 0xccaaff);

  // Slow, glowing chunks of star matter blown outward — more, bigger, faster.
  const bigCount = 32 + Math.floor(Math.random() * 18);
  for (let i = 0; i < bigCount; i++) {
    addBigFrag(rec, point,
      R * (0.045 + Math.random() * 0.10),
      120 + Math.random() * 320,
      11 + Math.random() * 9,
      0xff6622);
  }

  // Mid-size embers and bright spark cloud.
  const medCount = 60 + Math.floor(Math.random() * 30);
  for (let i = 0; i < medCount; i++) {
    addMedFrag(rec, point,
      R * (0.025 + Math.random() * 0.05),
      90 + Math.random() * 240,
      6 + Math.random() * 6);
  }

  // Heavy spark cloud + intense ray streaks.
  addSparks(rec, point, 2400, 240, 820, 4.2, 0xfff1b8, 4.0);
  addRays(rec, point, 140, 1900, 0.30, 0xffeac6, 5.0);
  // Secondary slower violet ray burst for chromatic depth.
  addRays(rec, point,  64, 1100, 0.45, 0xddaaff, 6.0);

  // Slow drifting remnant — a wide, dim spark cloud (NOT a sphere — a sphere
  // engulfs the camera at close range and whites out the view). The sparks
  // are positional and drift out at varying speeds, settling into a faint
  // glowing "scar" of debris that persists for ~10s.
  addSparks(rec, point, 900, 30, 140, 12.0, 0xb088ff, 2.2);

  explosions.push(rec);
  playSupernovaSound();
}

function updateExplosions(dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const rec = explosions[i];
    rec.t += dt;
    let allDead = true;
    for (const p of rec.parts) {
      const ud = p.userData;
      if (!ud || ud.dead) continue;
      ud.lifetime -= dt;
      if (ud.lifetime <= 0) {
        p.visible = false; ud.dead = true; continue;
      }
      allDead = false;
      const tl = ud.totalLife || 1;
      switch (ud.type) {
        case 'flash': {
          const prog = 1 - ud.lifetime / tl;
          const s = ud.maxSize * prog;
          p.scale.set(s, s, s);
          p.material.opacity = clamp(ud.lifetime / tl, 0, 1);
          break;
        }
        case 'ring': {
          const prog = 1 - ud.lifetime / tl;
          const s = ud.maxSize * prog;
          p.scale.set(s, s, s);
          p.lookAt(camera.position);
          p.material.opacity = (1 - prog) * 0.9;
          break;
        }
        case 'sphere': {
          const prog = 1 - ud.lifetime / tl;
          const s = ud.maxSize * prog;
          p.scale.set(s, s, s);
          p.material.opacity = (1 - prog) * (ud.peakOpacity || 0.5);
          break;
        }
        case 'bigFrag':
        case 'medFrag': {
          p.position.addScaledVector(ud.vel, dt);
          p.rotation.x += ud.angVel.x * dt;
          p.rotation.y += ud.angVel.y * dt;
          p.rotation.z += ud.angVel.z * dt;
          // Fade alpha + emissive in the last 40% of the fragment's life so
          // it gracefully disappears instead of popping out.
          const fadePhase = clamp(ud.lifetime / (tl * 0.40), 0, 1);
          p.material.opacity = fadePhase;
          if (p.material.emissiveIntensity !== undefined) {
            p.material.emissiveIntensity = 0.8 * fadePhase;
          }
          break;
        }
        case 'sparks': {
          const pos = p.geometry.attributes.position.array;
          const vel = ud.velocities;
          for (let k = 0; k < pos.length; k++) pos[k] += vel[k] * dt;
          p.geometry.attributes.position.needsUpdate = true;
          p.material.opacity = clamp(ud.lifetime / tl, 0, 1);
          break;
        }
        case 'rays': {
          const elapsed = tl - ud.lifetime;
          const head = elapsed * ud.headSpeed;
          const tail = Math.max(0, elapsed - ud.tailDelay) * ud.headSpeed;
          const pos = p.geometry.attributes.position.array;
          const dirs = ud.dirs;
          const o = ud.origin;
          for (let k = 0; k < dirs.length; k++) {
            const d = dirs[k];
            pos[k*6]   = o.x + d.x * tail;
            pos[k*6+1] = o.y + d.y * tail;
            pos[k*6+2] = o.z + d.z * tail;
            pos[k*6+3] = o.x + d.x * head;
            pos[k*6+4] = o.y + d.y * head;
            pos[k*6+5] = o.z + d.z * head;
          }
          p.geometry.attributes.position.needsUpdate = true;
          p.material.opacity = clamp(ud.lifetime / tl, 0, 1);
          break;
        }
      }
    }
    if (allDead || rec.t > rec.duration + 8) {
      cleanupExplosion(rec);
      explosions.splice(i, 1);
    }
  }
}

function cleanupExplosion(rec) {
  for (const p of rec.parts) {
    if (p.parent) p.parent.remove(p);
    if (p.material) p.material.dispose();
    const t = p.userData && p.userData.type;
    if (t === 'flash' || t === 'ring' || t === 'sphere' || t === 'sparks' || t === 'rays') {
      if (p.geometry) p.geometry.dispose();
    }
  }
}

// Helper: remove a mesh from the scene and free its GPU buffers so no
// invisible shell is left occupying memory or the scene graph.
function disposeMesh(m) {
  if (!m) return;
  if (m.parent) m.parent.remove(m);
  if (m.material) {
    if (Array.isArray(m.material)) m.material.forEach(mat => mat.dispose && mat.dispose());
    else m.material.dispose && m.material.dispose();
  }
  if (m.geometry && m.geometry.dispose) m.geometry.dispose();
}

function removeDestructible(obj) {
  const idx = destructibles.indexOf(obj);
  if (idx !== -1) destructibles.splice(idx, 1);
  if (obj.parent) obj.parent.remove(obj);
  if (!obj.userData) return;

  // MOON — remove just this one body. Planet, siblings, rings all stay.
  if (obj.userData.kind === 'moon') {
    const planetRef = obj.userData.planetRef;
    if (planetRef && planetRef.moons) {
      const mi = planetRef.moons.findIndex(m => m.mesh === obj);
      if (mi !== -1) planetRef.moons.splice(mi, 1);
    }
    if (obj.material) obj.material.dispose && obj.material.dispose();
    if (obj.geometry) obj.geometry.dispose && obj.geometry.dispose();
    return;
  }

  // PLANET — cascade-remove every shell so no atmosphere / cloud / ring /
  // ring-asteroid / moon is left orbiting nothing.
  const ud = obj.userData;
  disposeMesh(ud.atmosphere);
  disposeMesh(ud.clouds);
  disposeMesh(ud.rings);
  if (ud.ringAsteroids && ud.ringAsteroids.parent) {
    ud.ringAsteroids.parent.remove(ud.ringAsteroids);
  }
  const planetRef = ud.planetRef;
  if (planetRef && planetRef.moons) {
    for (const m of planetRef.moons) {
      const mi = destructibles.indexOf(m.mesh);
      if (mi !== -1) destructibles.splice(mi, 1);
      disposeMesh(m.mesh);
    }
    planetRef.moons.length = 0;
  }
  if (obj.material) obj.material.dispose && obj.material.dispose();
  if (obj.geometry) obj.geometry.dispose && obj.geometry.dispose();

  if (ud.starRef && planetRef) {
    const sys = ud.starRef.system;
    if (sys) {
      const pi = sys.planets.indexOf(planetRef);
      if (pi !== -1) sys.planets.splice(pi, 1);
    }
  }
}

function destroyStar(star) {
  star.dead = true;
  // Hide its instance by zero-scaling its matrix (no need to dispose anything).
  if (star.instanceIndex !== undefined && star.instanceIndex >= 0) {
    _v1.copy(star.pos);
    _q1.identity();
    _v2.set(0, 0, 0);
    _m1.compose(_v1, _q1, _v2);
    starInstMesh.setMatrixAt(star.instanceIndex, _m1);
    coronaInstMesh.setMatrixAt(star.instanceIndex, _m1);
    starInstMesh.instanceMatrix.needsUpdate = true;
    coronaInstMesh.instanceMatrix.needsUpdate = true;
    instanceIndexToStar[star.instanceIndex] = null;
  }
  if (currentNearStar === star) currentNearStar = null;
  // Tear down its planetary system; the star is gone so the lights go out.
  if (activeSystemStar === star) {
    deactivateSystem(star);
    activeSystemStar = null;
  }
  // Rebuild the streamed star buffer so the dead star no longer appears as a pixel.
  rebuildActiveStars(true);
}

// ===== AUDIO =====
let audioCtx = null, audioMaster = null, padGain = null;
let engineOsc = null, engineGain = null;
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { return; }
  audioMaster = audioCtx.createGain();
  audioMaster.gain.value = 0.55;
  audioMaster.connect(audioCtx.destination);
  // Sub-bass pad — much lower than before, gives the void a constant rumble
  // instead of a thin pad. Three octaves all under 100 Hz.
  padGain = audioCtx.createGain();
  padGain.gain.value = 0.08;
  padGain.connect(audioMaster);
  const notes = [32.70, 41.20, 49.00];     // C1, E1, G1
  for (const f of notes) {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = f;
    const og = audioCtx.createGain();
    og.gain.value = 0.5;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 300;
    o.connect(og).connect(filt).connect(padGain);
    o.start();
  }
  // Engine — bassier sawtooth + tube-like distortion via waveshaper for grit.
  engineGain = audioCtx.createGain();
  engineGain.gain.value = 0;
  engineGain.connect(audioMaster);
  engineOsc = audioCtx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 38;
  // Second oscillator one octave up, detuned, for thickness.
  const engOsc2 = audioCtx.createOscillator();
  engOsc2.type = 'square';
  engOsc2.frequency.value = 76;
  engOsc2.detune.value = 7;
  const engFilt = audioCtx.createBiquadFilter();
  engFilt.type = 'lowpass';
  engFilt.frequency.value = 280;
  engFilt.Q.value = 1.2;
  engineOsc.connect(engFilt);
  engOsc2.connect(engFilt);
  engFilt.connect(engineGain);
  engineOsc.start();
  engOsc2.start();
  window.__engOsc2 = engOsc2;
}

// Soft-clip distortion curve — used to make hits sound crackly/saturated
// instead of sterile-clean sine waves.
function makeDistortionCurve(amount) {
  const n = 256;
  const curve = new Float32Array(n);
  const k = amount;
  for (let i = 0; i < n; i++) {
    const x = (i / n) * 2 - 1;
    curve[i] = ((1 + k) * x) / (1 + k * Math.abs(x));
  }
  return curve;
}

function playLaserSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // 1) Crackly noise burst — saturated white noise, very short, bandpass-shaped.
  const burstDur = 0.10;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * burstDur), audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) {
    const env = Math.pow(1 - i / ch.length, 1.8);
    ch[i] = (Math.random() * 2 - 1) * env;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(950, t);
  bp.frequency.exponentialRampToValueAtTime(220, t + burstDur);
  bp.Q.value = 4.2;
  const shaper = audioCtx.createWaveShaper();
  shaper.curve = makeDistortionCurve(3.0);
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.5, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + burstDur);
  noise.connect(bp).connect(shaper).connect(ng).connect(audioMaster);
  noise.start(t); noise.stop(t + burstDur + 0.02);
  // 2) Low PWM thump — gives the laser body weight instead of a pure beep.
  const o = audioCtx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(240, t);
  o.frequency.exponentialRampToValueAtTime(70, t + 0.20);
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.setValueAtTime(900, t);
  lpf.frequency.exponentialRampToValueAtTime(220, t + 0.20);
  lpf.Q.value = 3;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  o.connect(lpf).connect(g).connect(audioMaster);
  o.start(t); o.stop(t + 0.24);
}

function playExplosionSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // 1) Massive noise body — wider, longer, saturation-coloured.
  const dur = 2.2;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) {
    const f = i / ch.length;
    const env = Math.pow(1 - f, 1.4);
    // Mix two noise streams for a richer "crunch".
    ch[i] = ((Math.random() * 2 - 1) * 0.7 + (Math.random() * 2 - 1) * 0.3) * env;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(900, t);
  lp.frequency.exponentialRampToValueAtTime(45, t + 1.8);
  lp.Q.value = 1.4;
  const shaper = audioCtx.createWaveShaper();
  shaper.curve = makeDistortionCurve(6);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.55, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.9);
  src.connect(lp).connect(shaper).connect(g).connect(audioMaster);
  src.start(t);
  // 2) Sub-bass thump — short low-frequency sine punch.
  const o = audioCtx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(95, t);
  o.frequency.exponentialRampToValueAtTime(28, t + 0.55);
  const og = audioCtx.createGain();
  og.gain.setValueAtTime(0.85, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.70);
  o.connect(og).connect(audioMaster);
  o.start(t); o.stop(t + 0.75);
  // 3) Crackling debris — short bursts after the main hit.
  for (let k = 0; k < 6; k++) {
    const dt = 0.05 + Math.random() * 0.35;
    const cBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.08), audioCtx.sampleRate);
    const cCh = cBuf.getChannelData(0);
    for (let i = 0; i < cCh.length; i++) {
      cCh[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / cCh.length, 2);
    }
    const cSrc = audioCtx.createBufferSource();
    cSrc.buffer = cBuf;
    const cBp = audioCtx.createBiquadFilter();
    cBp.type = 'bandpass';
    cBp.frequency.value = 300 + Math.random() * 600;
    cBp.Q.value = 5;
    const cg = audioCtx.createGain();
    cg.gain.value = 0.12 + Math.random() * 0.10;
    cSrc.connect(cBp).connect(cg).connect(audioMaster);
    cSrc.start(t + dt); cSrc.stop(t + dt + 0.10);
  }
}

function playSupernovaSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // 1) Gigantic distorted noise wash — long tail.
  const dur = 7.0;
  const buf = audioCtx.createBuffer(2, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const ch = buf.getChannelData(c);
    for (let i = 0; i < ch.length; i++) {
      const f = i / ch.length;
      const env = Math.pow(1 - f, 1.2);
      ch[i] = ((Math.random() * 2 - 1) * 0.6 + (Math.random() * 2 - 1) * 0.4) * env;
    }
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(2400, t);
  lp.frequency.exponentialRampToValueAtTime(28, t + 6.5);
  lp.Q.value = 1.6;
  const shaper = audioCtx.createWaveShaper();
  shaper.curve = makeDistortionCurve(8);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(1.05, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 6.8);
  src.connect(lp).connect(shaper).connect(g).connect(audioMaster);
  src.start(t);
  // 2) Initial whomp — sharp sine transient with very low pitch.
  const o1 = audioCtx.createOscillator();
  o1.type = 'sine';
  o1.frequency.setValueAtTime(140, t);
  o1.frequency.exponentialRampToValueAtTime(16, t + 0.55);
  const og1 = audioCtx.createGain();
  og1.gain.setValueAtTime(1.2, t);
  og1.gain.exponentialRampToValueAtTime(0.001, t + 0.85);
  o1.connect(og1).connect(audioMaster);
  o1.start(t); o1.stop(t + 0.9);
  // 3) Sustained ultra-sub — felt more than heard.
  const o2 = audioCtx.createOscillator();
  o2.type = 'sine';
  o2.frequency.setValueAtTime(38, t);
  o2.frequency.exponentialRampToValueAtTime(18, t + 4.0);
  const og2 = audioCtx.createGain();
  og2.gain.setValueAtTime(0.72, t + 0.05);
  og2.gain.exponentialRampToValueAtTime(0.001, t + 5.0);
  o2.connect(og2).connect(audioMaster);
  o2.start(t); o2.stop(t + 5.1);
  // 4) Crackling debris field — many short bursts over 2.5s.
  for (let k = 0; k < 22; k++) {
    const dt = 0.15 + Math.random() * 2.4;
    const cBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.10), audioCtx.sampleRate);
    const cCh = cBuf.getChannelData(0);
    for (let i = 0; i < cCh.length; i++) {
      cCh[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / cCh.length, 1.6);
    }
    const cSrc = audioCtx.createBufferSource();
    cSrc.buffer = cBuf;
    const cBp = audioCtx.createBiquadFilter();
    cBp.type = 'bandpass';
    cBp.frequency.value = 180 + Math.random() * 900;
    cBp.Q.value = 5;
    const cg = audioCtx.createGain();
    cg.gain.value = 0.10 + Math.random() * 0.12;
    cSrc.connect(cBp).connect(cg).connect(audioMaster);
    cSrc.start(t + dt); cSrc.stop(t + dt + 0.12);
  }
}

function updateEngineAudio(throttle01) {
  if (!engineOsc || !engineGain) return;
  const t = audioCtx.currentTime;
  // Lower base frequency + slower rise for a meatier "tube engine" feel
  // rather than the previous chirpy pitch sweep.
  engineOsc.frequency.setTargetAtTime(28 + throttle01 * 70, t, 0.18);
  if (window.__engOsc2) {
    window.__engOsc2.frequency.setTargetAtTime(56 + throttle01 * 140, t, 0.18);
  }
  engineGain.gain.setTargetAtTime(0.025 + throttle01 * 0.22, t, 0.15);
}

// ===== CONTROLS =====
const keys = {};
let speed = 0;
const C_UNIT = 5000;
const MAX_C = 100;
const MAX_SPEED = C_UNIT * MAX_C;
const BASE_ACCEL = 3000;
const BOOST_MULT = 25;
const MOUSE_SENS = 0.0006;
const ROLL_RATE = 1.5;

// Smoothed input commands — both ease in from 0 toward target.
let throttleCmd = 0;          // -1 (S, reverse) .. +1 (W, forward)
let rollCmd = 0;              // -1 (E) .. +1 (Q)
// Longer time-constants so W/S build up + bleed off gradually instead of
// kicking in immediately. Feels like a heavy ship spooling its thrusters.
const THROTTLE_SMOOTH = 0.85;
const ROLL_SMOOTH = 0.20;

// Space brake: when set, decay speed to 0 smoothly over BRAKE_DUR seconds.
let brakeStart = -1;
const BRAKE_DUR = 0.5;
const BRAKE_TAU = 0.10;       // exp decay constant; ~99.3% gone by BRAKE_DUR

let hudHidden = false;
addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) brakeStart = performance.now() / 1000;
  if (e.code === 'KeyH' && !e.repeat) {
    hudHidden = !hudHidden;
    const hudEl = document.getElementById('hud');
    const cross = document.getElementById('crosshair');
    if (hudEl) hudEl.style.display = hudHidden ? 'none' : '';
    if (cross) cross.style.display = hudHidden ? 'none' : '';
  }
  keys[e.code] = true;
});
addEventListener('keyup', e => { keys[e.code] = false; });

const startBtn = document.getElementById('click-to-start');
startBtn.addEventListener('click', () => {
  initAudio();
  document.body.requestPointerLock();
});
// On every pointer-lock acquire, the very first mousemove can carry a huge
// accumulated movement delta (browser timing artifact) and on some systems a
// run of large spike deltas follows for a few ms. Skip those.
let mouseDropCount = 0;
document.addEventListener('pointerlockchange', () => {
  const title = document.getElementById('title-overlay');
  if (document.pointerLockElement) {
    startBtn.style.display = 'none';
    if (title) title.style.display = 'none';
    mouseDropCount = 3;          // ignore first few events after re-acquire
    if (typeof introActive !== 'undefined') introActive = false;
  } else {
    startBtn.style.display = 'block';
    startBtn.textContent = '► CLICK TO RESUME';
    // Hide the title overlay on resume — only show it on the very first load.
  }
});
// Mouse: accumulate raw deltas, apply later in updateShip as local-axis rotations.
// Hard per-event clamp avoids the rare "ship snaps 180°" caused by an outlier
// movement event reported by the browser.
const MOUSE_EVENT_CLAMP = 80;
document.addEventListener('mousemove', e => {
  if (!document.pointerLockElement) return;
  if (mouseDropCount > 0) { mouseDropCount--; return; }
  const dx = clamp(e.movementX, -MOUSE_EVENT_CLAMP, MOUSE_EVENT_CLAMP);
  const dy = clamp(e.movementY, -MOUSE_EVENT_CLAMP, MOUSE_EVENT_CLAMP);
  yawDelta   -= dx * MOUSE_SENS;
  pitchDelta -= dy * MOUSE_SENS;
});
document.addEventListener('mousedown', e => {
  if (document.pointerLockElement && e.button === 0) fireLaser();
});

function updateShip(dt) {
  // Apply mouse deltas as local-axis rotations on the camera quaternion.
  // Yaw around local Y, pitch around local X. Multiplying on the right
  // composes in local space, which avoids gimbal/Euler discontinuities.
  // Two safety rails so a stalled frame can't deliver a huge rotation snap:
  //   1. Hard cap on accumulated delta per frame (~17° max).
  //   2. Exponential smoothing toward the accumulator — produces analog feel
  //      and absorbs any remaining jitter.
  const FRAME_DELTA_CAP = 0.30;
  yawDelta   = clamp(yawDelta,   -FRAME_DELTA_CAP, FRAME_DELTA_CAP);
  pitchDelta = clamp(pitchDelta, -FRAME_DELTA_CAP, FRAME_DELTA_CAP);
  const smooth = 1 - Math.exp(-dt / 0.035);  // ~35ms time-constant
  const yawApply   = yawDelta   * smooth;
  const pitchApply = pitchDelta * smooth;
  yawDelta   -= yawApply;
  pitchDelta -= pitchApply;
  if (yawApply !== 0) {
    _qTmp.setFromAxisAngle(AXIS_Y, yawApply);
    camQuat.multiply(_qTmp);
  }
  if (pitchApply !== 0) {
    _qTmp.setFromAxisAngle(AXIS_X, pitchApply);
    camQuat.multiply(_qTmp);
  }
  // Roll: ease toward target rate instead of snapping.
  const rollTarget = (keys['KeyQ'] ? 1 : 0) - (keys['KeyE'] ? 1 : 0);
  rollCmd += (rollTarget - rollCmd) * (1 - Math.exp(-dt / ROLL_SMOOTH));
  if (Math.abs(rollCmd) > 1e-4) {
    _qTmp.setFromAxisAngle(AXIS_Z, ROLL_RATE * rollCmd * dt);
    camQuat.multiply(_qTmp);
  }
  camQuat.normalize();
  camera.quaternion.copy(camQuat);

  // Space brake — once triggered, decay smoothly to 0 over BRAKE_DUR seconds,
  // ignoring W/S until done.
  const now = performance.now() / 1000;
  if (brakeStart >= 0) {
    const elapsed = now - brakeStart;
    if (elapsed >= BRAKE_DUR) {
      speed = 0;
      brakeStart = -1;
      throttleCmd = 0;            // reset so next W/S press feels immediate
    } else {
      // Exponential decay — τ chosen so ~99% is gone within BRAKE_DUR.
      speed *= Math.exp(-dt / BRAKE_TAU);
    }
  } else {
    // W and S are symmetric — same acceleration magnitude, opposite directions.
    const throttleTarget = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
    throttleCmd += (throttleTarget - throttleCmd) * (1 - Math.exp(-dt / THROTTLE_SMOOTH));
    const mult = (keys['ShiftLeft'] || keys['ShiftRight']) ? BOOST_MULT : 1;
    speed += BASE_ACCEL * mult * throttleCmd * dt;
    speed = clamp(speed, -MAX_SPEED, MAX_SPEED);
  }

  // Auto-brake near planet surfaces — preserves sign, just bleeds magnitude.
  if (activeSystemStar) {
    const sys = activeSystemStar.system;
    if (sys && sys.active) {
      let minClearance = Infinity;
      for (const p of sys.planets) {
        const d = camera.position.distanceTo(p.mesh.position) - p.radius;
        if (d < minClearance) minClearance = d;
      }
      if (minClearance < 50) {
        speed *= Math.pow(0.05, dt);
      } else if (minClearance < 200) {
        const k = (minClearance - 50) / 150;
        speed *= Math.pow(0.4 + 0.6 * k, dt);
      }
    }
  }

  _v1.set(0, 0, -1).applyQuaternion(camera.quaternion);
  camera.position.addScaledVector(_v1, speed * dt);

  const strafe = speed * 0.5 + 80;
  if (keys['KeyA']) {
    _v2.set(-1, 0, 0).applyQuaternion(camera.quaternion);
    camera.position.addScaledVector(_v2, strafe * dt);
  }
  if (keys['KeyD']) {
    _v2.set(1, 0, 0).applyQuaternion(camera.quaternion);
    camera.position.addScaledVector(_v2, strafe * dt);
  }

  updateEngineAudio(Math.abs(speed) / MAX_SPEED);
}

// ===== HUD =====
const hud = document.getElementById('hud');
function updateHUD() {
  const cAbs = Math.abs(speed) / C_UNIT;
  const cStr = cAbs < 10 ? cAbs.toFixed(2) : cAbs.toFixed(1);
  const dir = speed > 0.5 ? 'FWD' : (speed < -0.5 ? 'REV' : '---');
  const pos = camera.position;
  const klass = currentNearStar ? currentNearStar.klass : '-';
  const targets = destructibles.length;
  const braking = brakeStart >= 0 ? '  [BRAKING]' : '';
  // Distance to nearest navigable body (planet or star). Helps the player
  // know "you are 4000 units from the nearest planet" so they know when to slow.
  let nearestBody = '-', nearestD = Infinity;
  if (currentNearStar) {
    const dStar = camera.position.distanceTo(currentNearStar.pos) - currentNearStar.radius;
    nearestD = Math.max(0, dStar);
    nearestBody = 'STAR ' + currentNearStar.klass;
  }
  if (activeSystemStar && activeSystemStar.system) {
    for (const p of activeSystemStar.system.planets) {
      const d = camera.position.distanceTo(p.mesh.position) - p.radius;
      if (d < nearestD) {
        nearestD = Math.max(0, d);
        nearestBody = p.type === 'gas' ? 'GAS GIANT' : (p.type === 'ice' ? 'ICE WORLD' : 'TERRESTRIAL');
      }
    }
  }
  const distStr = nearestD === Infinity ? '-' : nearestD.toFixed(0);
  hud.innerHTML =
    `SPEED: ${cStr} c ${dir}  /  ${MAX_C} c${braking}<br>` +
    `POS:   ${pos.x.toFixed(0)}, ${pos.y.toFixed(0)}, ${pos.z.toFixed(0)}<br>` +
    `STAR:  class ${klass}<br>` +
    `NEAR:  ${nearestBody} (${distStr} u)<br>` +
    `TGT:   ${targets}<br>` +
    `[W forward] [S reverse] [SPACE brake] [SHIFT boost x${BOOST_MULT}]<br>` +
    `[A/D strafe] [Q/E roll] [MOUSE look] [LMB fire] [H hide UI]`;
}

// ===== POST =====
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
// Bloom: tight glow on bright cores. Threshold high so only true light sources
// bloom; radius moderate so the glow stays disciplined.
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.32, 0.38, 0.90);
composer.addPass(bloom);
// Cinematic finishing pass — subtle vignette + slight warm/cool split-toning so
// the image reads as a film frame, not a sterile WebGL render.
const finishPass = new ShaderPass({
  uniforms: {
    tDiffuse: { value: null },
    uVignette: { value: 0.42 },
    uContrast: { value: 1.04 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uVignette;
    uniform float uContrast;
    varying vec2 vUv;
    void main() {
      vec3 c = texture2D(tDiffuse, vUv).rgb;
      // Mild contrast boost.
      c = (c - 0.5) * uContrast + 0.5;
      c = max(c, 0.0);
      // Split-toning: subtle warm in highlights, cool in shadows. Cinematic
      // "teal & orange" weighted very gently so it isn't kitsch.
      float lum = dot(c, vec3(0.299, 0.587, 0.114));
      vec3 shadowTint = vec3(0.92, 0.97, 1.05);
      vec3 highTint   = vec3(1.06, 0.99, 0.92);
      c *= mix(shadowTint, highTint, smoothstep(0.10, 0.85, lum));
      // Vignette.
      vec2 d = vUv - 0.5;
      float r = dot(d, d) * 2.0;
      float v = 1.0 - r * uVignette;
      v = clamp(v, 0.0, 1.0);
      c *= v;
      gl_FragColor = vec4(c, 1.0);
    }
  `
});
composer.addPass(finishPass);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth, innerHeight);
});

// ===== RENDER LOOP =====
const clock = new THREE.Clock();
let frame = 0;

updateNearStars();

// Cinematic intro orbit — before pointer lock is acquired, slowly orbit the
// camera around the home system's centroid so the first impression is
// a flowing wide shot, not a static screenshot.
const introCenter = home.pos.clone();
const introStart = camera.position.clone();
let introActive = true;

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  frame++;
  const t = performance.now() * 0.001;
  starMat.uniforms.uTime.value = t;
  starInstMat.uniforms.uTime.value = t;
  if (window.__anchorMat) window.__anchorMat.uniforms.uTime.value = t;
  // Drive per-instance ring-asteroid rotation. One uniform per ringed planet
  // material; cheap (1 GPU upload per material per frame).
  for (let i = 0; i < ringSpinMaterials.length; i++) {
    ringSpinMaterials[i].userData.uTime.value = t;
  }
  // Pre-game cinematic orbit. Suppressed once the player clicks-to-start.
  if (introActive && !document.pointerLockElement) {
    const relX = introStart.x - introCenter.x;
    const relZ = introStart.z - introCenter.z;
    const r0 = Math.hypot(relX, relZ);
    const startAng = Math.atan2(relZ, relX);
    const a = startAng + t * 0.04;
    camera.position.set(
      introCenter.x + Math.cos(a) * r0,
      introStart.y + Math.sin(t * 0.08) * 80,
      introCenter.z + Math.sin(a) * r0
    );
    camera.lookAt(introCenter.x - 100, introCenter.y + 100, introCenter.z - 300);
    camQuat.copy(camera.quaternion);
  } else {
    updateShip(dt);
  }
  rebuildActiveStars(false);                 // streams in new chunks if needed
  bgStarsGroup.position.copy(camera.position); // infinite-distance background
  if (frame % 10 === 0) updateNearStars();
  if (currentNearStar) {
    starLight.target.position.copy(camera.position);
    starLight.target.updateMatrixWorld();
  }
  updateActiveSystems(performance.now() * 0.001);
  updateLaser(dt);
  updateExplosions(dt);
  updateHUD();
  composer.render();
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
