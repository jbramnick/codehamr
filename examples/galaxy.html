          vec3 n = normalize(vLocal);
          float lat = n.y;
          float t = uTime * 0.02 + uSeed * 30.0;
          // Two bands of noise that drift sideways differently — gives swirling
          // turbulent cloud pattern.
          float a = noise(vec3(n.x*4.0 + t, lat*6.0, n.z*4.0)) * 0.6;
          float b = noise(vec3(n.x*16.0 - t*1.7, lat*22.0, n.z*16.0 + t*0.3)) * 0.4;
          float pattern = a + b;
          // Strong band envelope.
          float bandSig = sin(lat * 9.0 + pattern * 1.5 + uSeed * 12.0) * 0.5 + 0.5;
          float alpha = smoothstep(0.30, 0.70, pattern * 0.6 + bandSig * 0.5);
          // Fresnel edge — clouds thin out at limb.
          float f = clamp(dot(normalize(vN), normalize(vV)), 0.0, 1.0);
          alpha *= mix(0.25, 0.85, f);
          gl_FragColor = vec4(uColor, alpha * uOpacity);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending
    });
    const cloud = new THREE.Mesh(new THREE.SphereGeometry(radius * 1.012, 48, 32), cloudMat);
    result.clouds = cloud;
  }

  // Rings — much more likely on gas giants, sometimes on ice, never on small rocky.
  let ringChance = 0;
  if (type === 'gas')         ringChance = 0.75;
  else if (type === 'ice')    ringChance = 0.30;
  else if (radius > 35)       ringChance = 0.12;
  if (r() < ringChance) {
    const ringTex = ringTextureCache[Math.floor(r() * ringTextureCache.length)];
    const ringInner = radius * (1.30 + r() * 0.20);
    const ringOuter = radius * (2.05 + r() * 0.55);
    const ringTint = new THREE.Color().setHSL(0.08 + r()*0.06, 0.30 + r()*0.20, 0.60 + r()*0.20);
    // Custom ring shader: textured banding + planet shadow + sun-side lighting.
    const ringMat = new THREE.ShaderMaterial({
      uniforms: {
        uMap: { value: ringTex },
        uTint: { value: ringTint },
        uOpacity: { value: 0.95 },
        uPlanetCenterW: { value: new THREE.Vector3() },
        uPlanetRadius: { value: radius },
        uSunDirW: { value: new THREE.Vector3(1, 0, 0) }
      },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vWorld;
        void main() {
          vUv = uv;
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorld = wp.xyz;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }
      `,
      fragmentShader: `
        uniform sampler2D uMap;
        uniform vec3 uTint;
        uniform float uOpacity;
        uniform vec3 uPlanetCenterW;
        uniform float uPlanetRadius;
        uniform vec3 uSunDirW;
        varying vec2 vUv;
        varying vec3 vWorld;
        void main() {
          vec4 t = texture2D(uMap, vUv);
          vec3 c = t.rgb * uTint;
          // Planet shadow on the ring: on the anti-sun side, if the ring
          // point projects inside the planet radius, it's in umbra.
          vec3 rel = vWorld - uPlanetCenterW;
          float along = dot(rel, uSunDirW);
          vec3 perp = rel - along * uSunDirW;
          float pd = length(perp);
          float shadow = 1.0;
          if (along < 0.0) {
            shadow = smoothstep(uPlanetRadius * 0.85, uPlanetRadius * 1.10, pd);
          }
          // Hemispherical bias — slightly brighter on the sun-facing half.
          float litHemi = 0.5 + 0.5 * sign(along);
          float light = mix(0.55, 1.10, smoothstep(0.0, 1.0, litHemi));
          gl_FragColor = vec4(c * light * shadow, t.a * uOpacity);
        }
      `,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
      blending: THREE.NormalBlending
    });
    const ringGeom = makeRingGeometry(ringInner, ringOuter, 192);
    const rings = new THREE.Mesh(ringGeom, ringMat);
    const baseTilt = Math.PI * 0.5 - (0.18 + r() * 0.40);
    rings.rotation.set(baseTilt, r() * TAU, r() * 0.4 - 0.2);
    result.rings = rings;
    result.ringInner = ringInner;
    result.ringOuter = ringOuter;
    // Real 3D rock debris in the ring plane — every ringed planet gets one.
    result.ringAsteroids = makeRingAsteroidsGroup(result);
  }

  // Moons — varied flavors (rocky, icy, volcanic, ferrous, ocean) so a
  // gas-giant system shows clear color contrast between satellites.
  let moonCount = 0;
  if (type === 'gas')      moonCount = 1 + Math.floor(r() * 3); // 1..3
  else if (type === 'ice') moonCount = Math.floor(r() * 3);     // 0..2
  else if (radius > 25)    moonCount = Math.floor(r() * 2);     // 0..1
  for (let m = 0; m < moonCount; m++) {
    const moonR = radius * (0.14 + r() * 0.22);
    const moonGeom = new THREE.SphereGeometry(moonR, 28, 20);
    const flav = r();
    let base, secondary, mottle, glow = 0;
    if      (flav < 0.30) { base = new THREE.Color(0x8a7c66); secondary = new THREE.Color(0x4a4138); mottle = 0.55; }       // grey rocky
    else if (flav < 0.55) { base = new THREE.Color(0xe6eaf0); secondary = new THREE.Color(0xb9c4d6); mottle = 0.35; }       // icy white
    else if (flav < 0.75) { base = new THREE.Color(0xc4823a); secondary = new THREE.Color(0x6b3a18); mottle = 0.75; glow = 0.18; }  // volcanic ochre
    else if (flav < 0.88) { base = new THREE.Color(0x9a4f3a); secondary = new THREE.Color(0x4f2418); mottle = 0.55; }       // rust red
    else                  { base = new THREE.Color(0x6b8aaa); secondary = new THREE.Color(0x2a3e58); mottle = 0.45; }       // bluish ocean
    const mcolors = new Float32Array(moonGeom.attributes.position.count * 3);
    for (let i = 0; i < moonGeom.attributes.position.count; i++) {
      const x = moonGeom.attributes.position.getX(i);
      const y = moonGeom.attributes.position.getY(i);
      const z = moonGeom.attributes.position.getZ(i);
      const n1 = posNoise(x*0.5, y*0.5, z*0.5);
      const n2 = posNoise(x*1.4 + 11, y*1.4, z*1.4 + 5);
      const blend = clamp(n1 * 0.6 + n2 * 0.4, 0, 1);
      const c = _c1.copy(secondary).lerp(base, blend);
      c.multiplyScalar(0.75 + mottle * blend * 0.6);
      mcolors[i*3] = c.r; mcolors[i*3+1] = c.g; mcolors[i*3+2] = c.b;
    }
    moonGeom.setAttribute('color', new THREE.BufferAttribute(mcolors, 3));
    const moonMat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: flav < 0.55 ? 0.55 : 0.95,
      metalness: 0.0,
      emissive: glow > 0 ? base : new THREE.Color(0x000000),
      emissiveIntensity: glow,
      transparent: true, opacity: 1
    });
    const moon = new THREE.Mesh(moonGeom, moonMat);
    moon.userData.kind = 'moon';
    const moonBasis = makeRandomBasis(r);
    result.moons.push({
      mesh: moon,
      orbit: radius * (2.6 + r() * 2.5),
      phase: r() * TAU,
      speed: 0.4 + r() * 0.7,
      radius: moonR,
      basisU: moonBasis.u,
      basisV: moonBasis.v
    });
  }

  mesh.userData.atmosphere = result.atmosphere || null;
  mesh.userData.clouds = result.clouds || null;
  mesh.userData.rings = result.rings || null;
  mesh.userData.ringAsteroids = result.ringAsteroids || null;
  mesh.userData.planetRef = result;
  return result;
}

// ===== SYSTEMS =====
// Hand-tuned showcase planet — guaranteed gas giant with detailed banded rings
// and contrasting moons. Used for the home system so the first thing the
// player sees is a dramatic Saturn-like body.
function makeShowcasePlanet(r, orbit) {
  // Force "gas" type with large radius + rings + multiple varied moons.
  const radius = 145;
  const geom = new THREE.SphereGeometry(radius, 64, 64);
  paintPlanetSurface(geom, r, 'gas');
  geom.computeBoundingSphere();
  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.82, metalness: 0.0,
    transparent: true, opacity: 1
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.userData.kind = 'planet';
  const basis = makeRandomBasis(r);
  const result = {
    mesh, orbit, phase: 1.1,           // deterministic — puts it in view from initial cam
    speed: 0.08, radius, type: 'gas',
    atmoBaseOpacity: 0.55,
    ringBaseOpacity: 0.95,
    orbitU: basis.u, orbitV: basis.v, orbitN: basis.n,
    moons: []
  };
  // Bright atmosphere with sun-side bias.
  {
    const atmoColor = new THREE.Color(0xffdda0);
    const atmoMat = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: atmoColor }, uOpacity: { value: 1.0 },
        uPlanetCenterW: { value: new THREE.Vector3() },
        uSunDirW: { value: new THREE.Vector3(1, 0, 0) }
      },
      vertexShader: `
        varying vec3 vN;
        varying vec3 vV;
        varying vec3 vWorld;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorld = wp.xyz;
          vec4 mv = viewMatrix * wp;
          vN = normalize(normalMatrix * normal);
          vV = normalize(-mv.xyz);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uOpacity;
        uniform vec3 uPlanetCenterW;
        uniform vec3 uSunDirW;
        varying vec3 vN;
        varying vec3 vV;
        varying vec3 vWorld;
        void main() {
          float f = 1.0 - abs(dot(normalize(vN), normalize(vV)));
          float rim = pow(f, 2.2);
          vec3 surfaceDirW = normalize(vWorld - uPlanetCenterW);
          float sunFacing = clamp(dot(surfaceDirW, uSunDirW) * 0.5 + 0.5, 0.0, 1.0);
          // When the camera is "behind" the planet from the star (eclipse view),
          // the back-lit rim should glow even brighter — sun-light scattering
          // through the atmosphere creates that classic "halo around the
          // silhouette" look.
          float side = mix(0.18, 1.0, smoothstep(0.30, 0.85, sunFacing));
          // Eclipse boost — extra rim when this fragment is near the sun-side
          // edge of the planet but viewed from the anti-sun side.
          float eclipseBoost = smoothstep(0.30, 0.55, sunFacing) * smoothstep(0.45, 0.95, 1.0 - sunFacing) * rim * 2.5;
          gl_FragColor = vec4(uColor * (0.8 + rim * 1.8) * side + uColor * eclipseBoost, (rim * side + eclipseBoost) * uOpacity);
        }
      `,
      transparent: true, depthWrite: false, side: THREE.BackSide,
      blending: THREE.AdditiveBlending
    });
    const atmo = new THREE.Mesh(new THREE.SphereGeometry(radius * 1.08, 48, 36), atmoMat);
    result.atmosphere = atmo;
  }
  // Cloud layer.
  {
    const cloudMat = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: new THREE.Color(0xfff1d8) },
        uOpacity: { value: 1.0 },
        uTime: { value: 0 },
        uSeed: { value: 0.42 }
      },
      vertexShader: `
        varying vec3 vLocal;
        varying vec3 vN;
        varying vec3 vV;
        void main() {
          vLocal = position;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vN = normalize(normalMatrix * normal);
          vV = normalize(-mv.xyz);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uOpacity;
        uniform float uTime;
        uniform float uSeed;
        varying vec3 vLocal;
        varying vec3 vN;
        varying vec3 vV;
        float hash(vec3 p) { return fract(sin(dot(p, vec3(12.9898,78.233,37.719))) * 43758.5453); }
        float noise(vec3 p) {
          vec3 i = floor(p);
          vec3 f = fract(p); f = f*f*(3.0-2.0*f);
          float n000 = hash(i); float n100 = hash(i + vec3(1,0,0));
          float n010 = hash(i + vec3(0,1,0)); float n110 = hash(i + vec3(1,1,0));
          float n001 = hash(i + vec3(0,0,1)); float n101 = hash(i + vec3(1,0,1));
          float n011 = hash(i + vec3(0,1,1)); float n111 = hash(i + vec3(1,1,1));
          return mix(
            mix(mix(n000,n100,f.x), mix(n010,n110,f.x), f.y),
            mix(mix(n001,n101,f.x), mix(n011,n111,f.x), f.y),
            f.z);
        }
        void main() {
          vec3 n = normalize(vLocal);
          float lat = n.y;
          float t = uTime * 0.03 + uSeed * 30.0;
          float a = noise(vec3(n.x*5.0 + t, lat*7.0, n.z*5.0)) * 0.6;
          float b = noise(vec3(n.x*16.0 - t*1.7, lat*22.0, n.z*16.0 + t*0.3)) * 0.4;
          float pattern = a + b;
          float bandSig = sin(lat * 11.0 + pattern * 1.5 + uSeed * 12.0) * 0.5 + 0.5;
          float alpha = smoothstep(0.32, 0.72, pattern * 0.6 + bandSig * 0.55);
          float f = clamp(dot(normalize(vN), normalize(vV)), 0.0, 1.0);
          alpha *= mix(0.25, 0.85, f);
          gl_FragColor = vec4(uColor, alpha * uOpacity);
        }
      `,
      transparent: true, depthWrite: false, blending: THREE.NormalBlending
    });
    result.clouds = new THREE.Mesh(new THREE.SphereGeometry(radius * 1.012, 64, 48), cloudMat);
  }
  // Detailed banded rings — picked from cache but high-segment count.
  {
    const ringTex = ringTextureCache[0];
    const ringInner = radius * 1.42;
    const ringOuter = radius * 2.62;
    const ringTint = new THREE.Color(0xf3d8a0);
    const ringMat = new THREE.ShaderMaterial({
      uniforms: {
        uMap: { value: ringTex },
        uTint: { value: ringTint },
        uOpacity: { value: 0.95 },
        uPlanetCenterW: { value: new THREE.Vector3() },
        uPlanetRadius: { value: radius },
        uSunDirW: { value: new THREE.Vector3(1, 0, 0) }
      },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vWorld;
        void main() {
          vUv = uv;
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorld = wp.xyz;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }
      `,
      fragmentShader: `
        uniform sampler2D uMap;
        uniform vec3 uTint;
        uniform float uOpacity;
        uniform vec3 uPlanetCenterW;
        uniform float uPlanetRadius;
        uniform vec3 uSunDirW;
        varying vec2 vUv;
        varying vec3 vWorld;
        void main() {
          vec4 t = texture2D(uMap, vUv);
          vec3 c = t.rgb * uTint;
          vec3 rel = vWorld - uPlanetCenterW;
          float along = dot(rel, uSunDirW);
          vec3 perp = rel - along * uSunDirW;
          float pd = length(perp);
          float shadow = 1.0;
          if (along < 0.0) shadow = smoothstep(uPlanetRadius * 0.85, uPlanetRadius * 1.10, pd);
          float litHemi = 0.5 + 0.5 * sign(along);
          float light = mix(0.50, 1.15, smoothstep(0.0, 1.0, litHemi));
          gl_FragColor = vec4(c * light * shadow, t.a * uOpacity);
        }
      `,
      transparent: true, depthWrite: false, side: THREE.DoubleSide,
      blending: THREE.NormalBlending
    });
    const ringGeom = makeRingGeometry(ringInner, ringOuter, 256);
    const rings = new THREE.Mesh(ringGeom, ringMat);
    // Locked tilt — looks great from typical cruise angles.
    rings.rotation.set(Math.PI * 0.5 - 0.55, 0.7, 0.12);
    result.rings = rings;
    result.ringInner = ringInner;
    result.ringOuter = ringOuter;
    // Real 3D rock debris embedded in the ring — dense enough to fly through.
    result.ringAsteroids = makeRingAsteroidsGroup(result);
  }
  // Three contrasting moons (volcanic, icy, ocean) for the showcase.
  const moonFlavors = [
    { base: 0xc4823a, secondary: 0x6b3a18, mottle: 0.75, glow: 0.18, rough: 0.95 }, // volcanic ochre
    { base: 0xe6eaf0, secondary: 0xb9c4d6, mottle: 0.35, glow: 0.00, rough: 0.55 }, // icy white
    { base: 0x6b8aaa, secondary: 0x2a3e58, mottle: 0.45, glow: 0.00, rough: 0.55 }  // bluish ocean
  ];
  for (let m = 0; m < moonFlavors.length; m++) {
    const f = moonFlavors[m];
    const moonR = radius * (0.20 + m * 0.05);
    const moonGeom = new THREE.SphereGeometry(moonR, 28, 20);
    const base = new THREE.Color(f.base);
    const secondary = new THREE.Color(f.secondary);
    const mcolors = new Float32Array(moonGeom.attributes.position.count * 3);
    for (let i = 0; i < moonGeom.attributes.position.count; i++) {
      const x = moonGeom.attributes.position.getX(i);
      const y = moonGeom.attributes.position.getY(i);
      const z = moonGeom.attributes.position.getZ(i);
      const n1 = posNoise(x*0.5, y*0.5, z*0.5);
      const n2 = posNoise(x*1.4 + 11, y*1.4, z*1.4 + 5);
      const blend = clamp(n1 * 0.6 + n2 * 0.4, 0, 1);
      const c = _c1.copy(secondary).lerp(base, blend);
      c.multiplyScalar(0.75 + f.mottle * blend * 0.6);
      mcolors[i*3] = c.r; mcolors[i*3+1] = c.g; mcolors[i*3+2] = c.b;
    }
    moonGeom.setAttribute('color', new THREE.BufferAttribute(mcolors, 3));
    const moonMat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: f.rough,
      metalness: 0.0,
      emissive: f.glow > 0 ? base : new THREE.Color(0x000000),
      emissiveIntensity: f.glow,
      transparent: true, opacity: 1
    });
    const moon = new THREE.Mesh(moonGeom, moonMat);
    moon.userData.kind = 'moon';
    const moonBasis = makeRandomBasis(r);
    result.moons.push({
      mesh: moon,
      orbit: radius * (3.0 + m * 0.7),
      phase: m * 1.3,
      speed: 0.35 + m * 0.18,
      radius: moonR,
      basisU: moonBasis.u,
      basisV: moonBasis.v
    });
  }
  mesh.userData.atmosphere = result.atmosphere;
  mesh.userData.clouds = result.clouds || null;
  mesh.userData.rings = result.rings;
  mesh.userData.ringAsteroids = result.ringAsteroids || null;
  mesh.userData.planetRef = result;
  return result;
}

const destructibles = [];
let activeSystemStar = null;

function buildSystem(star) {
  const sys = { planets: [], belts: [], active: false };
  const r = mulberry32((Math.abs(Math.floor(star.pos.x)) * 7919 +
                        Math.abs(Math.floor(star.pos.y)) * 31 +
                        Math.abs(Math.floor(star.pos.z)) * 113) | 0);
  const planetCount = 4 + Math.floor(r() * 5);
  let lastOrbit = star.radius * 3.0 + 200;
  // Home system always gets a guaranteed showcase planet (big ringed gas giant)
  // as one of its planets so the player has something dramatic right out of the
  // gate. Other systems are fully procedural.
  const isHome = (star === home);
  for (let i = 0; i < planetCount; i++) {
    lastOrbit += 300 + r() * 600;
    let p;
    if (isHome && i === 1) {
      p = makeShowcasePlanet(r, lastOrbit);
    } else {
      p = makePlanet(r, star.radius, lastOrbit);
    }
    p.starRef = star;
    p.mesh.userData.starRef = star;
    sys.planets.push(p);
  }
  // 2..5 belts per system, each with its own colour palette / density /
  // thickness / tilt — lots of variety as you move between systems.
  const beltCount = 2 + Math.floor(r() * 4);
  for (let i = 0; i < beltCount; i++) {
    const innerR = star.radius * (2.5 + r() * 4) + r() * 3500;
    const outerR = innerR + 350 + r() * 1900;
    const count = 1500 + Math.floor(r() * 3000);
    const matIdx = Math.floor(r() * beltMaterials.length);
    sys.belts.push(makeBelt(star.pos, innerR, outerR, count, matIdx));
  }
  star.system = sys;
}

function deactivateSystem(star) {
  const sys = star.system;
  if (!sys || !sys.active) return;
  for (const p of sys.planets) {
    if (p.mesh.parent) p.mesh.parent.remove(p.mesh);
    if (p.atmosphere && p.atmosphere.parent) p.atmosphere.parent.remove(p.atmosphere);
    if (p.clouds && p.clouds.parent) p.clouds.parent.remove(p.clouds);
    if (p.rings && p.rings.parent) p.rings.parent.remove(p.rings);
    if (p.ringAsteroids && p.ringAsteroids.parent) p.ringAsteroids.parent.remove(p.ringAsteroids);
    for (const m of p.moons) {
      if (m.mesh.parent) m.mesh.parent.remove(m.mesh);
      const mi = destructibles.indexOf(m.mesh);
      if (mi !== -1) destructibles.splice(mi, 1);
    }
    const di = destructibles.indexOf(p.mesh);
    if (di !== -1) destructibles.splice(di, 1);
  }
  for (const b of sys.belts) {
    if (b.parent) b.parent.remove(b);
  }
  sys.active = false;
}

function activateSystem(star) {
  if (!star.system) buildSystem(star);
  const sys = star.system;
  if (sys.active) return;
  for (const p of sys.planets) {
    scene.add(p.mesh);
    destructibles.push(p.mesh);
    if (p.atmosphere) scene.add(p.atmosphere);
    if (p.clouds) scene.add(p.clouds);
    if (p.rings) scene.add(p.rings);
    if (p.ringAsteroids) scene.add(p.ringAsteroids);
    for (const m of p.moons) {
      scene.add(m.mesh);
      // Moons get the same destruction wiring as planets.
      m.mesh.userData.kind = 'moon';
      m.mesh.userData.planetRef = p;
      m.mesh.userData.starRef = star;
      destructibles.push(m.mesh);
    }
  }
  for (const b of sys.belts) scene.add(b);
  sys.active = true;
}

// Planet fade range — widened so big gas giants still register at long range,
// matching the bigger system scale.
const PLANET_FULL = 9000;
const PLANET_GONE = 22000;

function updateActiveSystems(time) {
  if (!activeSystemStar) return;
  const star = activeSystemStar;
  const sys = star.system;
  if (!sys || !sys.active) return;
  for (const p of sys.planets) {
    const a = p.phase + time * p.speed * 0.05;
    const ox = Math.cos(a) * p.orbit;
    const oy = Math.sin(a) * p.orbit;
    p.mesh.position.set(
      star.pos.x + ox * p.orbitU.x + oy * p.orbitV.x,
      star.pos.y + ox * p.orbitU.y + oy * p.orbitV.y,
      star.pos.z + ox * p.orbitU.z + oy * p.orbitV.z
    );
    p.mesh.rotation.y += 0.005;
    // Distance fade — measured to each planet individually so far-side planets
    // disappear before near-side ones as the camera flies away.
    const d = camera.position.distanceTo(p.mesh.position);
    const f = smoothstep(PLANET_GONE, PLANET_FULL, d);
    p.mesh.material.opacity = f;
    p.mesh.visible = f > 0.005;
    if (p.atmosphere) {
      p.atmosphere.position.copy(p.mesh.position);
      const u = p.atmosphere.material.uniforms;
      if (u && u.uOpacity) {
        u.uOpacity.value = f * p.atmoBaseOpacity;
        if (u.uPlanetCenterW) u.uPlanetCenterW.value.copy(p.mesh.position);
        if (u.uSunDirW) {
          _v1.copy(star.pos).sub(p.mesh.position).normalize();
          u.uSunDirW.value.copy(_v1);
        }
      } else {
        p.atmosphere.material.opacity = f * p.atmoBaseOpacity;
      }
      p.atmosphere.visible = p.mesh.visible;
    }
    if (p.clouds) {
      p.clouds.position.copy(p.mesh.position);
      p.clouds.rotation.copy(p.mesh.rotation);
      const cu = p.clouds.material.uniforms;
      if (cu) {
        cu.uOpacity.value = f * 0.85;
        cu.uTime.value = time;
      }
      p.clouds.visible = p.mesh.visible;
    }
    if (p.rings) {
      p.rings.position.copy(p.mesh.position);
      const u = p.rings.material.uniforms;
      if (u && u.uOpacity) {
        u.uOpacity.value = f * p.ringBaseOpacity;
        u.uPlanetCenterW.value.copy(p.mesh.position);
        u.uPlanetRadius.value = p.radius;
        // Sun direction in world space: from planet to star (so along>0 means
        // the ring point is on the lit side of the planet).
        _v1.copy(star.pos).sub(p.mesh.position).normalize();
        u.uSunDirW.value.copy(_v1);
      } else {
        p.rings.material.opacity = f * p.ringBaseOpacity;
      }
      p.rings.visible = p.mesh.visible;
    }
    if (p.ringAsteroids) {
      p.ringAsteroids.position.copy(p.mesh.position);
      const spin = p.ringAsteroids.userData.spinMesh;
      if (spin) {
        // Absolute rotation derived from world time — deterministic across
        // re-entries to the system.
        spin.rotation.z = time * p.ringAsteroids.userData.angularSpeed;
      }
      p.ringAsteroids.visible = p.mesh.visible;
    }
    // Moons orbit the planet (not the star).
    for (const m of p.moons) {
      const ma = m.phase + time * m.speed;
      const mox = Math.cos(ma) * m.orbit;
      const moy = Math.sin(ma) * m.orbit;
      m.mesh.position.set(
        p.mesh.position.x + mox * m.basisU.x + moy * m.basisV.x,
        p.mesh.position.y + mox * m.basisU.y + moy * m.basisV.y,
        p.mesh.position.z + mox * m.basisU.z + moy * m.basisV.z
      );
      m.mesh.rotation.y += 0.01;
      m.mesh.material.opacity = f;
      m.mesh.visible = p.mesh.visible;
    }
  }
}

// ===== NEAREST STAR (LIGHTING + SYSTEM ONLY) =====
// Every active star already renders as a real 3D sphere via the InstancedMesh
// above — no K-set management, no swap. The only thing left to track here is
// the single closest star, which drives lighting and the active planet system.
let currentNearStar = null;

function updateNearStars() {
  let nearest = null, bestD = Infinity;
  for (const s of allActiveStars) {
    if (s.dead) continue;
    const d = camera.position.distanceToSquared(s.pos);
    if (d < bestD) { bestD = d; nearest = s; }
  }
  if (nearest !== currentNearStar) {
    if (activeSystemStar && activeSystemStar !== nearest) {
      deactivateSystem(activeSystemStar);
      activeSystemStar = null;
    }
    currentNearStar = nearest;
    if (nearest) {
      activateSystem(nearest);
      activeSystemStar = nearest;
      starLight.position.copy(nearest.pos);
      starLight.color.copy(nearest.color);
      starLight.intensity = 3.5;
    }
  }
  if (currentNearStar) {
    starLight.target.position.copy(camera.position);
    starLight.target.updateMatrixWorld();
  }
}

// ===== NEBULAE — STELLAR NURSERIES IN WORLD SPACE =====
// See spawnNebulae below: a small number of distinct planetary nebulae,
// each with embedded newborn-star pinpricks at its core.

// ===== STELLAR NURSERIES — RARE GIANT PLANETARY NEBULAE =====
// A handful of huge, distinct planetary nebulae scattered across the local
// region. Each is a star-birth cocoon: an outer pastel shroud with embedded
// glowing newborn stars at its core. Rare and far apart so they remain
// "objects you stumble upon" rather than wallpaper.
// Volumetric multi-colour nebula texture. Three colour fields (core / shell /
// accent) painted as overlapping clouds with varied blob sizes, dark "voids"
// punched out to suggest dust silhouettes, and a bright pinprick core.
// Matches the cyan/magenta/pink cinematic look in the reference images.
function makeNurseryTexture(coreCol, shellCol, seed) {
  const r = mulberry32(seed);
  // An accent hue chosen 120° around the colour wheel from the core — gives
  // the cyan/magenta two-tone look without needing more inputs.
  const accent = new THREE.Color().setHSL(
    (new THREE.Color().copy(coreCol).getHSL({}).h + 0.5) % 1,
    0.55, 0.55
  );

  const size = 512;
  const cnv = document.createElement('canvas');
  cnv.width = size; cnv.height = size;
  const ctx = cnv.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, size, size);
  ctx.globalCompositeOperation = 'lighter';
  const cx = size/2, cy = size/2;

  // LAYER 1: Big diffuse shell — wide soft halo for the outer boundary.
  const halo = ctx.createRadialGradient(cx, cy, size*0.08, cx, cy, size*0.50);
  const sR = (shellCol.r*255)|0, sG = (shellCol.g*255)|0, sB = (shellCol.b*255)|0;
  halo.addColorStop(0.00, `rgba(${sR},${sG},${sB},0.80)`);
  halo.addColorStop(0.30, `rgba(${sR},${sG},${sB},0.35)`);
  halo.addColorStop(0.70, `rgba(${sR},${sG},${sB},0.08)`);
  halo.addColorStop(1.00, `rgba(${sR},${sG},${sB},0)`);
  ctx.fillStyle = halo; ctx.fillRect(0, 0, size, size);

  // LAYER 2: Big puffy clouds in the core colour — fewer but larger blobs.
  for (let i = 0; i < 28; i++) {
    const a = r() * TAU;
    const rad = Math.pow(r(), 0.7) * size * 0.34;
    const x = cx + Math.cos(a) * rad;
    const y = cy + Math.sin(a) * rad;
    const br = 50 + r() * 90;
    const c = coreCol;
    const cR = (c.r*255)|0, cG = (c.g*255)|0, cB = (c.b*255)|0;
    const g = ctx.createRadialGradient(x, y, 0, x, y, br);
    g.addColorStop(0,   `rgba(${cR},${cG},${cB},${0.45 + r()*0.35})`);
    g.addColorStop(0.5, `rgba(${cR},${cG},${cB},${0.18 + r()*0.18})`);
    g.addColorStop(1,   `rgba(${cR},${cG},${cB},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(x - br, y - br, br*2, br*2);
  }

  // LAYER 3: Accent-colour pockets — sparser, smaller, brighter. Adds the
  // cyan/magenta two-tone contrast.
  for (let i = 0; i < 16; i++) {
    const a = r() * TAU;
    const rad = Math.pow(r(), 0.5) * size * 0.36;
    const x = cx + Math.cos(a) * rad;
    const y = cy + Math.sin(a) * rad;
    const br = 30 + r() * 60;
    const aR = (accent.r*255)|0, aG = (accent.g*255)|0, aB = (accent.b*255)|0;
    const g = ctx.createRadialGradient(x, y, 0, x, y, br);
    g.addColorStop(0,   `rgba(${aR},${aG},${aB},${0.55 + r()*0.35})`);
    g.addColorStop(0.6, `rgba(${aR},${aG},${aB},${0.18 + r()*0.15})`);
    g.addColorStop(1,   `rgba(${aR},${aG},${aB},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(x - br, y - br, br*2, br*2);
  }

  // LAYER 4: Fine bright filaments — small white-hot bursts that read as
  // unresolved stars inside the cloud.
  for (let i = 0; i < 90; i++) {
    const a = r() * TAU;
    const rad = Math.pow(r(), 0.4) * size * 0.40;
    const x = cx + Math.cos(a) * rad;
    const y = cy + Math.sin(a) * rad;
    const br = 4 + r() * 10;
    const g = ctx.createRadialGradient(x, y, 0, x, y, br);
    g.addColorStop(0, `rgba(255,250,230,${0.45 + r()*0.45})`);
    g.addColorStop(1, `rgba(255,250,230,0)`);
    ctx.fillStyle = g;
    ctx.fillRect(x - br, y - br, br*2, br*2);
  }

  // LAYER 5: Hot pinprick core — newborn star at the heart.
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*0.14);
  const cR = (coreCol.r*255)|0, cG = (coreCol.g*255)|0, cB = (coreCol.b*255)|0;
  core.addColorStop(0.00, `rgba(255,255,255,1.0)`);
  core.addColorStop(0.18, `rgba(${cR},${cG},${cB},0.65)`);
  core.addColorStop(0.55, `rgba(${cR},${cG},${cB},0.20)`);
  core.addColorStop(1.00, `rgba(${cR},${cG},${cB},0)`);
  ctx.fillStyle = core; ctx.fillRect(0, 0, size, size);

  // LAYER 6: Dust silhouette punch-out. A handful of irregular dark blobs that
  // subtract from the cloud, suggesting dust lanes in front of the emission.
  ctx.globalCompositeOperation = 'destination-out';
  for (let i = 0; i < 8; i++) {
    const a = r() * TAU;
    const rad = Math.pow(r(), 0.6) * size * 0.32;
    const x = cx + Math.cos(a) * rad;
    const y = cy + Math.sin(a) * rad;
    const br = 28 + r() * 60;
    const g = ctx.createRadialGradient(x, y, 0, x, y, br);
    g.addColorStop(0, `rgba(0,0,0,${0.35 + r()*0.40})`);
    g.addColorStop(1, `rgba(0,0,0,0)`);
    ctx.fillStyle = g;
    ctx.fillRect(x - br, y - br, br*2, br*2);
  }

  // Circular mask so the additive billboard doesn't show its rectangular edges.
  ctx.globalCompositeOperation = 'destination-in';
  const mask = ctx.createRadialGradient(cx, cy, size*0.08, cx, cy, size*0.50);
  mask.addColorStop(0, 'rgba(0,0,0,1)');
  mask.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mask; ctx.fillRect(0, 0, size, size);

  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function spawnNebulae() {
  const nebRng = mulberry32(9999);
  // Five pre-blended palettes — each nursery picks one. Cores are intense
  // emission-line hues; shells are the cooler reflection halos.
  // Cinematic two-tone palette — every nebula has a cyan/turquoise shell with
  // a contrasting hot core. Matches the reference photos where dramatic blue
  // halos meet pink/magenta/gold cores.
  const schemes = [
    { core: new THREE.Color(0xff5577), shell: new THREE.Color(0x1166aa) }, // hot pink / steel blue
    { core: new THREE.Color(0xff9944), shell: new THREE.Color(0x115588) }, // ember / deep blue
    { core: new THREE.Color(0xffaa66), shell: new THREE.Color(0x442266) }, // sodium / violet
    { core: new THREE.Color(0xffeeaa), shell: new THREE.Color(0x1166cc) }, // white-hot / ice
    { core: new THREE.Color(0xff77cc), shell: new THREE.Color(0x114466) }, // magenta / midnight
    { core: new THREE.Color(0x55ffcc), shell: new THREE.Color(0x442288) }, // emerald / royal
    { core: new THREE.Color(0xffcc66), shell: new THREE.Color(0x223388) }, // gold / cobalt
  ];
  // 5 distant nurseries — pushed far out so they read as "you can fly toward
  // that pink cloud over there" landmarks, not wallpaper that swamps every view.
  const N = 5;
  for (let i = 0; i < N; i++) {
    const u = (i + 0.5) / N * 2.0 - 1.0;
    const theta = i * 2.39996 + nebRng() * 0.4;
    const sr = Math.sqrt(1 - u*u);
    const dist = 70000 + nebRng() * 60000;
    const cx = home.pos.x + sr * Math.cos(theta) * dist;
    const cy = home.pos.y + u * dist * 0.55;
    const cz = home.pos.z + sr * Math.sin(theta) * dist;

    const scheme = schemes[i % schemes.length];
    const tex = makeNurseryTexture(scheme.core, scheme.shell, 5000 + i);

    // Single billboard per nursery (no layered megasprites). Dimmer.
    const group = new THREE.Group();
    const baseSize = 9000 + nebRng() * 5000;
    for (let layer = 0; layer < 2; layer++) {
      const layerSize = baseSize * (1.0 + layer * 0.35);
      const mat = new THREE.SpriteMaterial({
        map: tex,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        opacity: 0.16 - layer * 0.05
      });
      const sp = new THREE.Sprite(mat);
      sp.position.set(
        cx + (nebRng()-0.5) * 800,
        cy + (nebRng()-0.5) * 800,
        cz + (nebRng()-0.5) * 800
      );
      sp.scale.set(layerSize, layerSize, 1);
      group.add(sp);
    }
    // Embedded newborn-star pinpricks — bright but small.
    const starTex = makeNebulaStarTex();
    const nbCount = 4 + Math.floor(nebRng() * 4);
    for (let j = 0; j < nbCount; j++) {
      const m = new THREE.SpriteMaterial({
        map: starTex, color: scheme.core,
        blending: THREE.AdditiveBlending,
        depthWrite: false, transparent: true,
        opacity: 0.85
      });
      const s = new THREE.Sprite(m);
      s.position.set(
        cx + (nebRng()-0.5) * 1800,
        cy + (nebRng()-0.5) * 1800,
        cz + (nebRng()-0.5) * 1800
      );
      const sz = 400 + nebRng() * 500;
      s.scale.set(sz, sz, 1);
      group.add(s);
    }
    scene.add(group);
  }
}

// Tiny radial-gradient texture used for the newborn-star pricks inside nurseries.
function makeNebulaStarTex() {
  const size = 64;
  const cnv = document.createElement('canvas');
  cnv.width = size; cnv.height = size;
  const ctx = cnv.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0.00, 'rgba(255,255,255,1)');
  g.addColorStop(0.30, 'rgba(255,255,255,0.45)');
  g.addColorStop(1.00, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
spawnNebulae();

// ===== BLACK HOLES =====
// Rare, striking landmarks. Each is built from three components:
//   1. Pure black event-horizon disc (front-facing billboard, depthTest off).
//   2. Accretion ring — flat textured disc canted in 3D, rendered as a Mesh
//      so the perspective gives the elongated edge-on appearance.
//   3. Lensing halo — soft bright ring outside the event horizon.
function makeAccretionDiscTexture(seed) {
  const r = mulberry32(seed);
  const size = 512;
  const cnv = document.createElement('canvas');
  cnv.width = size; cnv.height = size;
  const ctx = cnv.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, size, size);
  ctx.globalCompositeOperation = 'lighter';
  const cx = size/2, cy = size/2;

  // Build the disc by stamping many thin elliptical arcs from inside out,
  // each slightly noisy in colour/density. Hot inner = white→yellow, cooler
  // outer = orange→red→fading magenta.
  for (let i = 0; i < 600; i++) {
    const a = r() * TAU;
    const tR = Math.pow(r(), 0.4);                 // bias toward inner ring
    const rad = size * (0.18 + tR * 0.30);         // inner 0.18 .. outer 0.48
    const x = cx + Math.cos(a) * rad;
    const y = cy + Math.sin(a) * rad;
    const br = 2 + r() * 6;
    let R, G, B, A;
    if (tR < 0.10)      { R = 255; G = 255; B = 240; A = 0.95; }
    else if (tR < 0.30) { R = 255; G = 230; B = 160; A = 0.85; }
    else if (tR < 0.55) { R = 255; G = 170; B =  90; A = 0.70; }
    else if (tR < 0.78) { R = 240; G = 110; B =  60; A = 0.50; }
    else                { R = 180; G =  70; B = 110; A = 0.30; }
    A *= 0.6 + r() * 0.4;
    const g = ctx.createRadialGradient(x, y, 0, x, y, br);
    g.addColorStop(0, `rgba(${R},${G},${B},${A})`);
    g.addColorStop(1, `rgba(${R},${G},${B},0)`);
    ctx.fillStyle = g; ctx.fillRect(x-br, y-br, br*2, br*2);
  }
  // Inner-edge punch: razor-sharp dark gap at the event-horizon radius.
  ctx.globalCompositeOperation = 'destination-out';
  const punch = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*0.21);
  punch.addColorStop(0,    'rgba(0,0,0,1)');
  punch.addColorStop(0.82, 'rgba(0,0,0,1)');
  punch.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = punch; ctx.fillRect(0,0,size,size);
  // Hard outer mask.
  ctx.globalCompositeOperation = 'destination-in';
  const outer = ctx.createRadialGradient(cx, cy, size*0.30, cx, cy, size*0.50);
  outer.addColorStop(0, 'rgba(0,0,0,1)');
  outer.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = outer; ctx.fillRect(0,0,size,size);

  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeBlackHoleGlowTexture() {
  const size = 256;
  const cnv = document.createElement('canvas');
  cnv.width = size; cnv.height = size;
  const ctx = cnv.getContext('2d');
  const cx = size/2, cy = size/2;
  // Thin razor-sharp photon-sphere ring just outside the event horizon —
  // hot white/yellow. Then a tight orange halo, then a small cool tail.
  // Kept compact so it doesn't drown the accretion-disc ring.
  const ring = ctx.createRadialGradient(cx, cy, size*0.20, cx, cy, size*0.28);
  ring.addColorStop(0.00, 'rgba(255,240,200,0)');
  ring.addColorStop(0.30, 'rgba(255,240,200,1.0)');
  ring.addColorStop(0.55, 'rgba(255,180,100,0.55)');
  ring.addColorStop(1.00, 'rgba(255,150, 80,0)');
  ctx.fillStyle = ring; ctx.fillRect(0,0,size,size);
  // Tight outer halo — small, cool, faint.
  const halo = ctx.createRadialGradient(cx, cy, size*0.27, cx, cy, size*0.40);
  halo.addColorStop(0,    'rgba(140,160,220,0.18)');
  halo.addColorStop(1,    'rgba(140,160,220,0)');
  ctx.fillStyle = halo; ctx.fillRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeBlackHoleCoreTexture() {
  const size = 128;
  const cnv = document.createElement('canvas');
  cnv.width = size; cnv.height = size;
  const ctx = cnv.getContext('2d');
  const cx = size/2, cy = size/2;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,size,size);
  // Pure black disc, anti-aliased mask only.
  const mask = ctx.createRadialGradient(cx, cy, size*0.42, cx, cy, size*0.48);
  mask.addColorStop(0,    'rgba(0,0,0,1)');
  mask.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.globalCompositeOperation = 'destination-in';
  ctx.fillStyle = mask; ctx.fillRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// Cache the textures — reused across all BHs.
const BH_TEX = {
  disc: null, glow: null, core: null
};
function ensureBlackHoleTextures() {
  if (BH_TEX.disc) return;
  BH_TEX.disc = makeAccretionDiscTexture(13371);
  BH_TEX.glow = makeBlackHoleGlowTexture();
  BH_TEX.core = makeBlackHoleCoreTexture();
}

const blackHoles = [];
function spawnBlackHole(pos, radius, seed) {
  ensureBlackHoleTextures();
  const r = mulberry32(seed);
  const group = new THREE.Group();
  group.position.copy(pos);

  // Accretion disc — flat plane mesh, tilted, rendered with the disc texture.
  // Using a Mesh (not Sprite) so perspective compresses it edge-on naturally.
  const discGeom = new THREE.PlaneGeometry(1, 1);
  const discMat = new THREE.MeshBasicMaterial({
    map: BH_TEX.disc,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide
  });
  const disc = new THREE.Mesh(discGeom, discMat);
  const discSize = radius * 10.0;
  disc.scale.set(discSize, discSize, 1);
  // Tilt the disc so it reads as a clear elongated ellipse from typical
  // viewing angles — fully edge-on becomes invisible, fully face-on loses
  // the "Interstellar disc" silhouette. ~55–75° pitch is the sweet spot.
  const pitch = Math.PI * 0.5 - (0.25 + r() * 0.25);    // 55–75° from face-on
  disc.rotation.set(pitch, r() * TAU, r() * TAU);
  // Add a second disc rotated 90° in roll so the photon-sphere "ring around
  // the back" of the BH (the part of the disc behind the event horizon that
  // is gravitationally lensed up over the top) is suggested as a second
  // tilted ellipse — that classic "Interstellar" look.
  const disc2 = new THREE.Mesh(discGeom, discMat.clone());
  disc2.material.opacity = 0.55;
  disc2.scale.set(discSize * 0.95, discSize * 0.95, 1);
  disc2.rotation.set(pitch + Math.PI * 0.5, disc.rotation.y, disc.rotation.z);
  group.add(disc);
  group.add(disc2);

  // Lensing glow — a billboard sprite that always faces the camera. Sits a
  // hair outside the event horizon for the photon-sphere effect.
  const glowMat = new THREE.SpriteMaterial({
    map: BH_TEX.glow,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    opacity: 0.95
  });
  const glow = new THREE.Sprite(glowMat);
  const glowSize = radius * 5.5;
  glow.scale.set(glowSize, glowSize, 1);
  group.add(glow);

  // Event horizon — pure black sprite that occludes anything behind it via
  // alpha blending. Drawn over the glow with renderOrder.
  const coreMat = new THREE.SpriteMaterial({
    map: BH_TEX.core,
    color: 0x000000,
    transparent: true,
    depthWrite: false,
    blending: THREE.NormalBlending,
    opacity: 1.0
  });
  const core = new THREE.Sprite(coreMat);
  const coreSize = radius * 2.2;
  core.scale.set(coreSize, coreSize, 1);
  core.renderOrder = 5;
  group.add(core);

  scene.add(group);
  blackHoles.push({ group, radius, pos: pos.clone() });
  return group;
}
