version: 2

builds:
  - main: ./cmd/codehamr
    binary: jimmyhamr
    # Force static linking on every target. goreleaser v2 inherits the runner's
    # ambient env, so the NATIVE amd64 build on a gcc-equipped runner would link
    # CGO=1/dynamic (glibc-versioned) while the cross builds get CGO=0/static,
    # the asymmetry that shipped a dynamic linux-amd64 binary which fails to exec
    # after auto-update on musl/old-glibc hosts. codehamr is pure-Go, so CGO is
    # never needed; pinning it off keeps the delivered binary runnable anywhere.
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: "jimmyhamr-{{ if eq .Os \"darwin\" }}macos{{ else }}{{ .Os }}{{ end }}-{{ .Arch }}"

checksum:
  name_template: "jimmyhamr_checksums.txt"
  algorithm: sha256

changelog:
  use: git
  sort: desc
  abbrev: -1
  filters:
    exclude:
      - '^Merge '
